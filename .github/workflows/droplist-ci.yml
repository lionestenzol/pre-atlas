name: droplist-ci

# Task F quality gate (DROPLIST_MARKET_READY_SPEC seq 04): run the full pytest
# suite — 84 native tests + 9 script-style smoke gates wrapped by
# test_smoke_gates.py — with coverage, on every change under services/droplist.

on:
  push:
    paths:
      - "services/droplist/**"
      - ".github/workflows/droplist-ci.yml"
  pull_request:
    paths:
      - "services/droplist/**"
      - ".github/workflows/droplist-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/droplist
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (runtime + test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ui,llm,test]"

      - name: Pytest + coverage (gate floor enforced via pyproject fail_under)
        run: pytest -q --cov=droplist --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: services/droplist/coverage.xml
          if-no-files-found: ignore
