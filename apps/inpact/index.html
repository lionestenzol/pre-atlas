<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inPACT - Self-Sustaining Bullet Journal</title>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="app" class="min-h-screen flex flex-col md:flex-row">
    <header class="md:hidden sb-mobile-header" role="banner">
      <div class="flex items-center gap-3">
        <button id="mobile-menu-toggle" class="sb-mobile-btn" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="sidebar">
          <i class="fas fa-bars" aria-hidden="true"></i>
        </button>
        <div class="sb-mobile-brand">inPACT</div>
      </div>
      <div id="date-display" class="sb-date" aria-live="polite"></div>
    </header>

    <aside id="sidebar" class="sb-aside fixed md:static inset-0 z-40 hidden md:flex" role="navigation" aria-label="Main navigation">
      <div class="sb-brand">
        <div class="sb-brand-name">inPACT</div>
        <div class="sb-brand-tagline">Self-Sustaining Bullet Journal</div>
      </div>

      <nav class="flex flex-col gap-0.5" id="nav" aria-label="Page navigation"></nav>

      <div class="sb-divider"></div>

      <div class="sb-progress">
        <div class="sb-progress-label">This week</div>
        <div class="sb-progress-row">
          <span class="sb-progress-text">Tasks</span>
          <span id="weekly-tasks" class="sb-progress-value">0/0</span>
        </div>
        <div class="sb-progress-bar">
          <div id="weekly-progress-bar" class="sb-progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <div style="flex:1"></div>

      <div class="sb-divider"></div>

      <div id="atlas-status" style="padding:0 0.75rem;margin-bottom:0.25rem;"></div>
      <div class="flex flex-col gap-0.5">
        <button onclick="openAtlasAI()" class="sb-link" aria-label="Ask Atlas">
          <i class="fas fa-satellite-dish"></i>
          <span>Ask Atlas</span>
        </button>
        <button onclick="window.location.href='onboarding.html'" class="sb-link" aria-label="Open setup">
          <i class="fas fa-wand-magic-sparkles"></i>
          <span>Setup</span>
        </button>
        <button onclick="navigate('Settings')" class="sb-link">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </button>
        <button onclick="exportState()" class="sb-link">
          <i class="fas fa-download"></i>
          <span>Export</span>
        </button>
      </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 overflow-auto pb-20 md:pb-8" id="main-content" role="main" aria-label="Main content">
      <div class="max-w-6xl mx-auto">
      </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 sb-mobile-nav z-30" role="navigation" aria-label="Mobile navigation">
      <button onclick="navigate('Home')" class="sb-mobile-tab" data-tab="Home" aria-label="Go to Home">
        <i class="fas fa-home" aria-hidden="true"></i>
        <span>Home</span>
      </button>
      <button onclick="navigate('Daily')" class="sb-mobile-tab" data-tab="Daily" aria-label="Go to Daily planner">
        <i class="fas fa-calendar-day" aria-hidden="true"></i>
        <span>Daily</span>
      </button>
      <button onclick="navigate('Tasks')" class="sb-mobile-tab" data-tab="Tasks" aria-label="Go to Tasks">
        <i class="fas fa-tasks" aria-hidden="true"></i>
        <span>Tasks</span>
      </button>
      <button onclick="navigate('History')" class="sb-mobile-tab" data-tab="History" aria-label="Go to History">
        <i class="fas fa-history" aria-hidden="true"></i>
        <span>History</span>
      </button>
    </nav>
  </div>

  <!-- Always-on Ask Atlas entry: floating button, present on every screen -->
  <button onclick="openAtlasAI()" aria-label="Ask Atlas" title="Ask Atlas: what should I do right now?"
    style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:40;display:flex;align-items:center;gap:0.5rem;background:var(--ip-black);color:#fff;border:none;border-radius:9999px;padding:0.75rem 1.125rem;box-shadow:0 6px 18px rgba(17,24,39,0.28);cursor:pointer;font-family:var(--ip-font);font-weight:600;font-size:0.875rem;">
    <i class="fas fa-satellite-dish"></i>
    <span>Ask Atlas</span>
  </button>

  <div id="modal-container"></div>
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Core modules -->
  <script src="js/api.js"></script>
  <script src="js/state.js"></script>
  <script src="js/validator.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/helpers.js"></script>

  <!-- AI read + act: context export (AIContext) + action API (AIActions) -->
  <script src="js/ai-context.js"></script>
  <script src="js/ai-actions.js"></script>

  <!-- Application modules -->
  <script src="js/screens.js"></script>
  <script src="js/functions.js"></script>

  <!-- Google Calendar sync -->
  <script src="js/calendar.js"></script>

  <!-- Initialize app -->
  <script src="js/app.js"></script>

  <!-- Optogon stack: consume Signal.v1 from delta-kernel /api/signals -->
  <script src="js/signals.js"></script>

  <!-- Atlas item backbone: unified /items feed (droplist + cycleboard + inpact) -->
  <script src="js/backbone.js"></script>
</body>
</html>
