<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lattice</title>
<script src="cytoscape.min.js"></script>
<script src="zod.umd.js"></script>
<style>
:root {
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --surface-2: #F1EFE8;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text: #1A1917;
  --text-2: #5F5E5A;
  --text-3: #888780;
  --radius: 8px;
  --radius-lg: 12px;
  --accent: #378ADD;
  --accent-bg: #E6F1FB;
  --danger: #E24B4A;
  --danger-bg: #FCEBEB;
  --success: #639922;
  --success-bg: #EAF3DE;
  --neutral: #B4B2A9;
  --warn: #BA7517;
  --warn-bg: #FAEEDA;
  --p-lattice: #7F77DD;
  --p-optogon: #1D9E75;
  --p-atlas: #D85A30;
  --p-inpact: #378ADD;
  --p-property: #BA7517;
  --p-music: #D4537E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.45;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
button { background: none; border: none; cursor: pointer; font: inherit; color: inherit; padding: 0; }
ul, ol { list-style: none; }
svg { display: block; }
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); border: 0;
}

/* ---------- App layout ---------- */
.app {
  display: grid;
  grid-template-columns: 220px 1fr;
  height: 100vh;
}

/* ---------- Sidebar ---------- */
.sidebar {
  background: var(--surface-2);
  border-right: 1px solid var(--border);
  padding: 20px 14px;
  overflow-y: auto;
}
.brand {
  font-size: 14px;
  font-weight: 600;
  text-transform: lowercase;
  padding: 0 8px 16px;
  color: var(--text);
}
.nav-section {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 14px 8px 6px;
}
.nav-list { display: flex; flex-direction: column; gap: 1px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--radius);
  color: var(--text-2);
  cursor: pointer;
  font-size: 13px;
  text-transform: lowercase;
}
.nav-item:hover { background: rgba(0,0,0,0.04); }
.nav-item.active { background: rgba(0,0,0,0.07); color: var(--text); font-weight: 500; }
.nav-icon {
  width: 14px; height: 14px;
  display: inline-flex;
  opacity: 0.7;
  flex-shrink: 0;
}
.nav-label { flex: 1; }
.nav-count {
  font-size: 11px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}
.proj-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
}
.proj-dot.lattice  { background: var(--p-lattice); }
.proj-dot.optogon  { background: var(--p-optogon); }
.proj-dot.atlas    { background: var(--p-atlas); }
.proj-dot.inpact   { background: var(--p-inpact); }
.proj-dot.property { background: var(--p-property); }
.proj-dot.music    { background: var(--p-music); }

/* ---------- Main ---------- */
.main { overflow-y: auto; display: flex; flex-direction: column; }
.topbar {
  position: sticky;
  top: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 2;
}
.breadcrumb {
  font-size: 13px;
  color: var(--text-2);
  font-weight: 500;
  flex: 1;
  text-transform: lowercase;
}
.view-switch {
  display: flex;
  background: var(--surface-2);
  border-radius: var(--radius);
  padding: 2px;
  gap: 1px;
}
.view-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-2);
  text-transform: lowercase;
}
.view-btn:hover { color: var(--text); }
.view-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.view-btn svg { width: 14px; height: 14px; }
.add-btn, .today-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--text);
  text-transform: lowercase;
}
.add-btn:hover, .today-btn:hover { background: var(--surface-2); }
.add-btn svg { width: 12px; height: 12px; }
.today-btn svg { width: 13px; height: 13px; }

@keyframes today-flash {
  0%   { box-shadow: 0 0 0 0 var(--accent), inset 0 0 0 0 var(--accent-bg); background-color: var(--accent-bg); }
  100% { box-shadow: 0 0 0 0 transparent, inset 0 0 0 0 transparent; }
}
.today-flash { animation: today-flash 1.2s ease-out; }

.legend { display: none; }

.content { flex: 1; padding: 28px 32px; }
.view { display: none; }
.view.active { display: block; }

/* ---------- TREE view ---------- */
.tree-section + .tree-section { margin-top: 28px; }
.tree-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.tree-header .proj-dot { width: 9px; height: 9px; }
.proj-name {
  font-size: 13px;
  font-weight: 600;
  text-transform: lowercase;
  color: var(--text);
}
.proj-progress {
  font-size: 11px;
  color: var(--text-3);
}

.item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 4px;
  font-size: 13px;
  cursor: pointer;
  border-radius: var(--radius);
}
.item:hover { background: rgba(0,0,0,0.025); }
.item.ctx-open { background: var(--accent-bg); }

/* ---------- Inline + new item row ---------- */
.new-item-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 4px;
  font-size: 12px;
  color: var(--text-3);
  border: 1px dashed transparent;
  border-radius: var(--radius);
  margin-top: 4px;
  cursor: text;
  text-transform: lowercase;
  user-select: none;
}
.new-item-row:hover {
  color: var(--text-2);
  border-color: var(--border);
}
.new-item-row.editing {
  background: var(--surface);
  border-color: var(--accent);
  cursor: text;
  user-select: auto;
}
.new-item-row .ni-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.5;
}
.new-item-row .ni-input {
  flex: 1;
  border: none;
  outline: none;
  font: inherit;
  background: transparent;
  color: var(--text);
  font-size: 13px;
}
.new-item-row .ni-hint {
  font-size: 10px;
  color: var(--text-3);
  flex-shrink: 0;
}

/* ---------- Right-click context menu ---------- */
.ctx-menu {
  position: fixed;
  min-width: 180px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06);
  padding: 4px;
  z-index: 100;
  font-size: 12px;
}
.ctx-prov {
  font-size: 10px;
  color: var(--text-3);
  font-style: italic;
  padding: 6px 10px 4px;
  border-bottom: 1px solid var(--surface-2);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.ctx-mode-toggle {
  font-size: 10px;
  color: var(--text-3);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 3px;
  font-style: normal;
  font-family: monospace;
}
.ctx-mode-toggle:hover { background: var(--surface-2); color: var(--text); }
.ctx-section {
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 6px 10px 4px;
}
.ctx-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 6px 10px;
  border-radius: 4px;
  text-align: left;
  color: var(--text);
  text-transform: lowercase;
}
.ctx-btn:hover { background: var(--surface-2); }
.ctx-btn.danger { color: #791F1F; }
.ctx-btn.danger:hover { background: var(--danger-bg); }
.ctx-btn .ctx-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ctx-btn .ctx-dot.open    { background: var(--neutral); }
.ctx-btn .ctx-dot.active  { background: var(--accent); }
.ctx-btn .ctx-dot.blocked { background: var(--danger); }
.ctx-btn .ctx-dot.done    { background: var(--success); }
.ctx-btn .ctx-dot.dropped { background: var(--text-3); }
.ctx-btn.checked { font-weight: 500; }
.ctx-btn.checked::after { content: '✓'; margin-left: auto; color: var(--accent); }

/* Compact pip / pill rows so the menu doesn't sprawl */
.ctx-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px 6px;
}
.ctx-row-label {
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  min-width: 50px;
}
.ctx-pip {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.1s;
  box-sizing: border-box;
}
.ctx-pip:hover { border-color: var(--text-3); }
.ctx-pip.checked { border-color: var(--text); }
.ctx-stat {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 9px;
  cursor: pointer;
  text-transform: lowercase;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-3);
}
.ctx-stat:hover { background: var(--surface-2); }
.ctx-stat.checked {
  background: var(--surface-2);
  color: var(--text);
  font-weight: 500;
  border-color: var(--text);
}
.ctx-current {
  font-size: 11px;
  color: var(--text);
  padding: 0 10px 6px 60px;
  margin-top: -4px;
  min-height: 14px;
  font-style: italic;
}
.ctx-current.preview { color: var(--text-2); }

.settings-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin: 0 16px 12px;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.settings-panel[hidden] { display: none; }
.settings-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.settings-label {
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  min-width: 90px;
}
.settings-row label {
  display: flex; align-items: center; gap: 5px;
  cursor: pointer; color: var(--text-2);
}
.settings-row input { cursor: pointer; }

/* Graph node-type variants */
.graph-node.node-project .graph-node-bg {
  fill: var(--surface-2);
  stroke: var(--text-3);
  stroke-dasharray: 4 3;
}
.graph-node.node-project .graph-node-title {
  font-weight: 500;
  text-transform: lowercase;
}
.graph-node.ghost { opacity: 0.45; }
.graph-node.ghost .graph-node-bg { stroke-dasharray: 2 3; fill: transparent; }
.ctx-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}
.item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.item-id {
  font-size: 11px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
  width: 40px;
  flex-shrink: 0;
  text-align: right;
  flex-shrink: 0;
}
.item-title { flex: 1; min-width: 160px; }
.link-overflow {
  font-size: 11px;
  color: var(--text-3);
  padding: 2px 4px;
  align-self: center;
}
.item.is-done .item-title { text-decoration: line-through; color: var(--text-3); }
.item.is-dropped { opacity: 0.5; }
.item-meta {
  font-size: 11px;
  color: var(--text-3);
  flex-shrink: 0;
  text-transform: lowercase;
}
.item-links {
  display: inline-flex;
  gap: 4px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  min-width: 70px;
  justify-content: center;
  text-transform: lowercase;
  flex-shrink: 0;
}
.sp-dot { width: 5px; height: 5px; border-radius: 50%; }
.status-pill.open    { background: var(--surface-2); color: var(--text-2); }
.status-pill.open    .sp-dot { background: var(--neutral); }
.status-pill.active  { background: var(--accent-bg); color: #0C447C; }
.status-pill.active  .sp-dot { background: var(--accent); }
.status-pill.blocked { background: var(--danger-bg); color: #791F1F; }
.status-pill.blocked .sp-dot { background: var(--danger); }
.status-pill.done    { background: var(--success-bg); color: #27500A; }
.status-pill.done    .sp-dot { background: var(--success); }
.status-pill.dropped { background: var(--surface-2); color: var(--text-3); }
.status-pill.dropped .sp-dot { background: var(--neutral); }

.link-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10px;
  background: var(--surface-2);
  color: var(--text-2);
  text-transform: lowercase;
}
.link-badge.blocks  { background: var(--danger-bg); color: #791F1F; }
.link-badge.spawned { background: var(--warn-bg);   color: #633806; }
.link-badge.relates { background: var(--surface-2); color: var(--text-2); }

/* ---------- GRAPH view ---------- */
.graph-header {
  margin: 0 16px 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.graph-legend-inline {
  display: flex; flex-wrap: wrap; gap: 14px;
  font-size: 10px; color: var(--text-3);
  margin-top: 8px;
}
.graph-legend-inline span { display: inline-flex; align-items: center; gap: 5px; }
.graph-legend-inline .leg-line {
  display: inline-block; width: 16px; height: 2px;
}
.graph-legend-inline .leg-line.blocks   { background: #E24B4A; }
.graph-legend-inline .leg-line.spawned  { background: #BA7517; }
.graph-legend-inline .leg-line.relates  { background: #888780; }
.graph-legend-inline .leg-line.belongs  { background: #d9d6cb; border-top: 1px dashed #888; height: 0; }
.graph-legend-inline .graph-hint { margin-left: auto; font-style: italic; }
.graph-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.graph-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
}
.graph-wrap {
  position: relative;
  width: 100%;
  /* Consume the remaining viewport so cy fits without page scroll. */
  height: calc(100vh - 280px);
  min-height: 520px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.graph-wrap svg { width: 100%; height: 100%; }

.graph-node { cursor: pointer; }
.graph-node-bg {
  fill: var(--surface);
  stroke: var(--border-strong);
  stroke-width: 1;
}
.graph-node.active  .graph-node-bg { fill: var(--accent-bg); stroke: var(--accent); }
.graph-node.blocked .graph-node-bg { fill: var(--danger-bg); stroke: var(--danger); }
.graph-node.done    .graph-node-bg { fill: var(--success-bg); stroke: var(--success); }
.graph-node.selected .graph-node-bg { stroke-width: 2; }
.graph-node-title {
  font-size: 12px;
  font-weight: 500;
  fill: var(--text);
}
.graph-node-meta {
  font-size: 10px;
  fill: var(--text-3);
}
.graph-edge { stroke-width: 1.4; fill: none; }
.graph-edge.blocks  { stroke: var(--danger); }
.graph-edge.spawned { stroke: var(--warn); }
.graph-edge.relates { stroke: var(--text-3); stroke-dasharray: 3 3; }
.graph-edge-label {
  font-size: 9px;
  fill: var(--text-3);
  text-transform: lowercase;
}
.graph-legend {
  position: absolute;
  bottom: 16px;
  left: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 10px;
  color: var(--text-3);
  background: rgba(255,255,255,0.85);
  padding: 8px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.leg-row { display: flex; align-items: center; gap: 6px; }
.leg-line { width: 20px; height: 1.4px; display: inline-block; }
.leg-line.blocks  { background: var(--danger); }
.leg-line.spawned { background: var(--warn); }
.leg-line.relates {
  background-image: linear-gradient(90deg, var(--text-3) 50%, transparent 50%);
  background-size: 6px 2px;
  background-repeat: repeat-x;
  height: 2px;
}

/* ---------- TIMELINE view ---------- */
.day-section + .day-section { margin-top: 24px; }
.day-header {
  font-size: 12px;
  color: var(--text-3);
  text-transform: lowercase;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.event-row {
  display: grid;
  grid-template-columns: 60px 90px 110px 1fr;
  gap: 12px;
  padding: 7px 4px;
  align-items: center;
  font-size: 12px;
}
.event-row:hover { background: rgba(0,0,0,0.02); }
.event-time {
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
}
.event-kind {
  font-size: 11px;
  text-transform: lowercase;
  font-weight: 500;
}
.event-kind.add    { color: var(--accent); }
.event-kind.status { color: var(--text-2); }
.event-kind.link   { color: var(--warn); }
.event-kind.done   { color: var(--success); }
.event-project {
  font-size: 11px;
  color: var(--text-3);
  text-transform: lowercase;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.event-desc { color: var(--text); }

/* ---------- Timeline sub-switch (list / 7-day / calendar) + zoom ---------- */
.timeline-sub-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.timeline-sub-switch {
  display: inline-flex;
  background: var(--surface-2);
  border-radius: var(--radius);
  padding: 2px;
  gap: 1px;
}
.zoom-controls {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--surface-2);
  border-radius: var(--radius);
  padding: 3px 6px;
}
.zoom-controls .zoom-label {
  font-size: 11px;
  color: var(--text-3);
  text-transform: lowercase;
  padding: 0 4px;
  user-select: none;
}
.zoom-btn {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: var(--surface);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  line-height: 1;
  color: var(--text);
  border: 1px solid var(--border);
  font-weight: 500;
}
.zoom-btn:hover:not(:disabled) { background: var(--accent-bg); border-color: var(--accent); color: #0C447C; }
.zoom-btn:disabled { opacity: 0.3; cursor: not-allowed; background: transparent; border-color: transparent; }
.timeline-sub-btn {
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-2);
  text-transform: lowercase;
}
.timeline-sub-btn:hover { color: var(--text); }
.timeline-sub-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

/* ---------- TIMELINE: 7-day view ---------- */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}
.week-col {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  background: var(--surface);
  min-height: 220px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.week-col.today { background: var(--accent-bg); border-color: var(--accent); }
.week-col-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 10px;
  color: var(--text-3);
  text-transform: lowercase;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.week-col-header .wd { font-weight: 500; }
.week-col-header .dn {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.week-col.today .week-col-header .dn { color: var(--accent); }
.week-event {
  font-size: 11px;
  padding: 6px 6px;
  border-radius: 4px;
  background: var(--surface-2);
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: pointer;
}
.week-event:hover { background: rgba(0,0,0,0.05); }
.week-event-top {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
}
.week-event-top .we-time { color: var(--text-3); font-variant-numeric: tabular-nums; }
.week-event-top .we-kind { font-weight: 500; text-transform: lowercase; }
.week-event-top .we-kind.add    { color: var(--accent); }
.week-event-top .we-kind.status { color: var(--text-2); }
.week-event-top .we-kind.link   { color: var(--warn); }
.week-event-top .we-kind.done   { color: var(--success); }
.week-event-desc {
  color: var(--text);
  font-size: 11px;
  line-height: 1.3;
}
.week-col-empty {
  font-size: 10px;
  color: var(--text-3);
  text-align: center;
  padding: 16px 0;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ---------- TIMELINE: calendar view ---------- */
.cal-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.cal-title {
  font-size: 14px;
  font-weight: 600;
  text-transform: lowercase;
  color: var(--text);
}
.cal-summary {
  font-size: 11px;
  color: var(--text-3);
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-weekday {
  font-size: 10px;
  color: var(--text-3);
  text-transform: lowercase;
  text-align: center;
  padding: 6px 0;
  font-weight: 500;
}
.cal-day {
  aspect-ratio: 1.1;
  padding: 6px 8px;
  border-radius: var(--radius);
  background: rgba(0,0,0,0.012);
  border: 1px solid transparent;
  display: flex;
  flex-direction: column;
  gap: 4px;
  cursor: default;
}
.cal-day.other-month { opacity: 0.32; }
.cal-day.today {
  background: var(--accent-bg);
  border-color: var(--accent);
}
.cal-day.has-events { background: var(--surface-2); cursor: pointer; }
.cal-day.has-events:hover { background: rgba(0,0,0,0.05); }
.cal-day .day-num {
  font-size: 11px;
  color: var(--text-2);
  font-variant-numeric: tabular-nums;
}
.cal-day.today .day-num { color: var(--accent); font-weight: 700; }
.cal-events {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: auto;
}
.cal-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.cal-dot.add    { background: var(--accent); }
.cal-dot.status { background: var(--text-3); }
.cal-dot.link   { background: var(--warn); }
.cal-dot.done   { background: var(--success); }

/* ---------- Responsive: mobile (single column, narrow-style) ---------- */
@media (max-width: 599px) {
  .app {
    grid-template-columns: 1fr;
    height: auto;
    min-height: 100vh;
  }
  .sidebar { display: none; }

  .main {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    overflow-y: visible;
  }

  .topbar {
    flex-wrap: wrap;
    padding: 14px 16px 12px;
    gap: 10px;
  }
  .breadcrumb {
    width: 100%;
    flex: none;
    font-size: 11px;
    color: var(--text-3);
    order: 0;
  }
  .view-switch {
    flex: 1;
    order: 1;
  }
  .view-btn {
    flex: 1;
    justify-content: center;
    padding: 7px 4px;
  }
  .view-btn span { display: none; }
  .today-btn {
    order: 2;
    padding: 7px 10px;
  }
  .today-btn span { display: none; }
  .add-btn {
    order: 3;
    padding: 7px 10px;
  }
  .add-btn span { display: none; }

  .legend {
    display: flex;
    gap: 14px;
    padding: 10px 16px 12px;
    font-size: 10px;
    color: var(--text-3);
    text-transform: lowercase;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .leg { display: inline-flex; align-items: center; gap: 4px; }
  .leg-dot { width: 6px; height: 6px; border-radius: 50%; }
  .leg-dot.active  { background: var(--accent); }
  .leg-dot.blocked { background: var(--danger); }
  .leg-dot.open    { background: var(--neutral); }
  .leg-dot.done    { background: var(--success); }

  .content { padding: 16px; }

  .item {
    flex-wrap: wrap;
    padding: 10px 4px;
    gap: 8px;
  }
  .item-dot { order: 1; }
  .item-id  { display: none; }
  .item-title { order: 2; flex: 1 1 auto; min-width: 180px; }
  .item-pill-wrap { display: none; }
  .item-links { order: 3; flex-shrink: 0; }
  .item-meta  { order: 4; flex-basis: 100%; padding-left: 16px; font-size: 10px; margin-top: 2px; }

  .graph-wrap { height: 460px; }
  .graph-node-title { font-size: 13px; }
  .graph-node-meta  { font-size: 10px; }
  .graph-edge-label { font-size: 10px; }
  .graph-legend {
    font-size: 9px;
    padding: 6px 8px;
    bottom: 8px;
    left: 8px;
  }

  .event-row {
    grid-template-columns: 50px 70px 1fr;
    gap: 8px;
  }
  .event-project { display: none; }

  .timeline-sub-row {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    margin-bottom: 14px;
  }
  .timeline-sub-switch {
    display: flex;
    width: 100%;
  }
  .timeline-sub-btn { flex: 1; text-align: center; }
  .zoom-controls { align-self: flex-end; }

  .week-grid {
    grid-template-columns: 1fr;
    gap: 6px;
  }
  .week-col { min-height: auto; padding: 12px; }
  .week-col-header { font-size: 11px; }
  .week-col-header .dn { font-size: 13px; }

  .cal-wrap { padding: 12px; }
  .cal-day { padding: 4px 5px; aspect-ratio: 1; }
  .cal-day .day-num { font-size: 10px; }
  .cal-dot { width: 4px; height: 4px; }
  .cal-events { gap: 2px; }
  .cal-weekday { font-size: 9px; padding: 4px 0; }
}
</style>

<body>
<h2 class="sr-only">lattice: a tree, graph, and time view of work items across projects</h2>

          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>

    <div class="settings-panel" id="settings-panel" hidden>

            <button class="timeline-sub-btn"        data-sub="week"     role="tab" aria-selected="false">7-day view</button>
            <button class="timeline-sub-btn"        data-sub="calendar" role="tab" aria-selected="false">calendar view</button>
          </div>

<div class="ctx-menu" id="ctx-menu" hidden role="menu" aria-label="item actions"></div>

<script>
/* ============================================================
 * DATA: single source of truth
 * Tree and graph render from the SAME `items` array.
 * Tree shows each item with its outgoing links.
 * Graph shows incoming + outgoing for the focus node.
 * ============================================================ */

// === SUBSTRATE-FED DATA ===
// items / projects / events start empty and are populated by loadViewmodel()
// which hits delta-kernel's /api/lattice/viewmodel. See lattice-projection.ts
// for the Atlas -> lattice mapping.

// Top-level `var` so these bindings are shared with the module-script
// at the bottom (which writes through `window.items` etc. on every
// Replicache subscription fire). With `let` the module's writes would
// not be visible to the renderers below.
var projects = [
  { id: 'lattice',  name: 'lattice'  },
  { id: 'optogon',  name: 'optogon'  },
  { id: 'atlas',    name: 'atlas'    },
  { id: 'inpact',   name: 'inpact'   },
  { id: 'property', name: 'property' },
  { id: 'music',    name: 'music'    },
];

var items = [];
var events = [];
var nodes = [];   // graph nodes: items + projects (type: 'item' | 'project')
var edges = [];   // graph edges: belongs_to | blocks | spawned | relates

// Settings: the knobs. Sticky via localStorage.
let settings = (function() {
  const defaults = {
    showProjects: true,    // include project nodes in graph
    showItems: true,       // include item nodes in graph
    graphDepth: 1,         // 1 | 2 | Infinity (all). null in storage means Infinity (JSON round-trip).
    sources: { execute_now: true, next_up: false, backlog: false },
    visibleProjects: { lattice: true, optogon: true, atlas: true, inpact: true, property: true, music: true },
  };
  try {
    const raw = localStorage.getItem('lattice.settings');
    if (!raw) return defaults;
    const stored = JSON.parse(raw);
    // Deep-merge nested objects so missing keys fall back to defaults
    // (shallow Object.assign would lose unset nested keys).
    return {
      showProjects: stored.showProjects ?? defaults.showProjects,
      showItems: stored.showItems ?? defaults.showItems,
      graphDepth: stored.graphDepth === null ? Infinity : (stored.graphDepth ?? defaults.graphDepth),
      sources: Object.assign({}, defaults.sources, stored.sources || {}),
      visibleProjects: Object.assign({}, defaults.visibleProjects, stored.visibleProjects || {}),
    };
  } catch (_) { return defaults; }
})();
function saveSettings() {
  try { localStorage.setItem('lattice.settings', JSON.stringify(settings)); } catch (_) {}
}

// Derive graph from items[] + projects[] when server doesn't return nodes/edges.
function deriveNodes() {
  const out = [];
  const seen = new Set();
  function add(n) { if (seen.has(n.id)) return; seen.add(n.id); out.push(n); }
  if (settings.showProjects) {
    for (const p of projects) {
      add({ id: 'project:' + p.id, type: 'project', label: p.name, project: p.id });
    }
  }
  if (settings.showItems) {
    for (const it of items) {
      add({
        id: it.id, type: 'item', label: it.title,
        project: it.project, status: it.status, provenance: it.provenance,
      });
    }
    // Ghost stubs for link targets we don't have full data for —
    // keeps the graph from looking empty when canonical links point
    // to items in unloaded tiers (next_up, backlog).
    for (const it of items) {
      for (const l of it.links) {
        if (seen.has(l.to)) continue;
        add({
          id: l.to, type: 'item',
          label: l.to.replace(/^canon_/, '#'),
          project: it.project, status: 'open',
          provenance: { source: 'cognitive-sensor.idea_registry', ghost: true },
        });
      }
    }
  }
  return out;
}
function deriveEdges() {
  const out = [];
  if (settings.showProjects && settings.showItems) {
    for (const it of items) out.push({ from: it.id, to: 'project:' + it.project, kind: 'belongs_to' });
  }
  if (settings.showItems) {
    for (const it of items) {
      for (const l of it.links) out.push({ from: it.id, to: l.to, kind: l.kind });
    }
  }
  return out;
}

const TODAY_ISO = '2026-05-28';
var FOCUS_ITEM_ID = null;  // var so module-script can mutate via window.FOCUS_ITEM_ID

// === SUBSTRATE WIRING ===
// Replicache (lattice/replicache.bundle.mjs) is the sync seam: optimistic
// mutators apply locally and queue a push; puller adapts delta-kernel's
// /api/lattice/viewmodel response into a Replicache PullResponse; pusher
// forwards each queued mutation to /api/lattice/correct.
//
// Bootstrap order: the module <script> at the bottom of <body> resolves
// the Replicache instance into `window.latticeSync`. This page-level
// helper waits for it and then bridges into the existing render loop.

async function syncReady() {
  if (window.latticeSync && window.latticeSync.ready) {
    await window.latticeSync.ready;
    return window.latticeSync;
  }
  return new Promise(resolve => {
    window.addEventListener('lattice:sync-ready', () => resolve(window.latticeSync), { once: true });
  });
}

/* ============================================================
 * STATE
 * ============================================================ */

let currentView = 'tree';
let currentFilter = { type: 'all' };
let graphCenter = FOCUS_ITEM_ID;
let currentTimelineSub = 'list'; // 'list' | 'week' | 'calendar'

/* ============================================================
 * ICONS (Tabler-style minimal inline SVG, no CDN)
 * ============================================================ */

function svgIcon(kind) {
  const paths = {
    'stack-2':        '<path d="M12 4l-9 5 9 5 9-5-9-5z"/><path d="M3 14l9 5 9-5"/>',
    'flame':          '<path d="M12 3c1 4 5 6 5 11a5 5 0 1 1-10 0c0-2 1-4 2-5 1 2 2 1 3-6z"/>',
    'alert-triangle': '<path d="M12 3l10 17H2L12 3z"/><path d="M12 10v4M12 16v.01"/>',
  };
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' + (paths[kind] || '') + '</svg>';
}

/* ============================================================
 * HELPERS
 * ============================================================ */

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
// IDs are either substrate strings (canon_0250) or locally-added numbers.
// idEq compares both safely; itemById normalizes.
function idEq(a, b) { return String(a) === String(b); }
function itemById(id) { return items.find(i => idEq(i.id, id)); }
// Short display id: strip canonical prefix (canon_0250 -> 0250) so the id column
// stays narrow. Numeric/short ids pass through unchanged.
function displayId(id) {
  if (typeof id !== 'string') return String(id);
  const m = id.match(/^canon_(\d+)$/);
  if (m) return m[1];
  return id.length > 6 ? id.slice(-4) : id;
}
function statusPill(status) {
  const safe = escapeHtml(String(status == null ? '' : status));
  return '<span class="status-pill ' + safe + '"><span class="sp-dot"></span>' + safe + '</span>';
}
function linkBadge(kind, toId) {
  return '<span class="link-badge ' + kind + '">' + kind + ' #' + displayId(toId) + '</span>';
}
function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + '…' : s; }

function projectProgress(pid) {
  const its = items.filter(i => i.project === pid);
  const counts = { active: 0, blocked: 0, done: 0, open: 0, dropped: 0 };
  its.forEach(i => counts[i.status]++);
  const order = ['done', 'active', 'blocked', 'open', 'dropped'];
  const parts = order.filter(k => counts[k] > 0).map(k => counts[k] + ' ' + k);
  return parts.join(' · ') || (its.length + ' items');
}

/* ============================================================
 * SIDEBAR
 * ============================================================ */

function renderSidebar() {
  const viewNav = document.getElementById('view-nav');
  const activeCount  = items.filter(i => i.status === 'active').length;
  const blockedCount = items.filter(i => i.status === 'blocked').length;

  const navRow = (filter, label, count, icon) => {
    const isActive =
      (filter.type === 'all' && currentFilter.type === 'all') ||
      (filter.type === 'status' && currentFilter.type === 'status' && filter.value === currentFilter.value) ||
      (filter.type === 'project' && currentFilter.type === 'project' && filter.value === currentFilter.value);
    return '<li class="nav-item ' + (isActive ? 'active' : '') + '" data-filter=\'' + JSON.stringify(filter) + '\'>' +
      icon +
      '<span class="nav-label">' + label + '</span>' +
      '<span class="nav-count">' + count + '</span>' +
    '</li>';
  };

  viewNav.innerHTML =
    navRow({ type: 'all' }, 'all projects', items.length, '<span class="nav-icon">' + svgIcon('stack-2') + '</span>') +
    navRow({ type: 'status', value: 'active'  }, 'active',  activeCount,  '<span class="nav-icon">' + svgIcon('flame') + '</span>') +
    navRow({ type: 'status', value: 'blocked' }, 'blocked', blockedCount, '<span class="nav-icon">' + svgIcon('alert-triangle') + '</span>');

  const projectNav = document.getElementById('project-nav');
  projectNav.innerHTML = projects.map(p => {
    const count = items.filter(i => i.project === p.id).length;
    return navRow({ type: 'project', value: p.id }, escapeHtml(p.name), count, '<span class="proj-dot ' + p.id + '"></span>');
  }).join('');

  Array.from(document.querySelectorAll('.nav-item')).forEach(el => {
    el.addEventListener('click', () => {
      currentFilter = JSON.parse(el.dataset.filter);
      updateBreadcrumb();
      renderSidebar();
      renderTree();
      switchView('tree');
    });
  });
}

function updateBreadcrumb() {
  const b = document.getElementById('breadcrumb');
  if (currentFilter.type === 'all') b.textContent = 'all projects';
  else if (currentFilter.type === 'status') b.textContent = currentFilter.value + ' items';
  else if (currentFilter.type === 'project') b.textContent = currentFilter.value;
}

/* ============================================================
 * TREE VIEW
 * ============================================================ */

function renderTree() {
  const root = document.getElementById('view-tree');

  let visible = items;
  if (currentFilter.type === 'status')  visible = items.filter(i => i.status === currentFilter.value);
  if (currentFilter.type === 'project') visible = items.filter(i => i.project === currentFilter.value);

  const grouped = projects.map(p => ({
    project: p,
    items: visible.filter(i => i.project === p.id),
  })).filter(g => g.items.length > 0);

  if (grouped.length === 0) {
    root.innerHTML = '<p style="color:var(--text-3);font-size:12px;">no items in this view.</p>';
    return;
  }

  root.innerHTML = grouped.map(g => {
    const itemsHtml = g.items.map(item => {
      const LINK_CAP = 3;
      const visibleLinks = item.links.slice(0, LINK_CAP);
      const overflow = item.links.length - visibleLinks.length;
      const linksHtml = item.links.length
        ? '<span class="item-links">' +
            visibleLinks.map(l => linkBadge(l.kind, l.to)).join('') +
            (overflow > 0 ? '<span class="link-overflow">+' + overflow + '</span>' : '') +
          '</span>'
        : '';
      const cls = 'item' + (item.status === 'done' ? ' is-done' : '') + (item.status === 'dropped' ? ' is-dropped' : '');
      return '<div class="' + cls + '" data-item-id="' + item.id + '">' +
        '<span class="item-dot proj-dot ' + item.project + '"></span>' +
        '<span class="item-id">#' + displayId(item.id) + '</span>' +
        '<span class="item-title">' + escapeHtml(item.title) + '</span>' +
        '<span class="item-pill-wrap">' + statusPill(item.status) + '</span>' +
        '<span class="item-meta">' + escapeHtml(item.time) + '</span>' +
        linksHtml +
      '</div>';
    }).join('');

    const newRowHtml = '<div class="new-item-row" data-project="' + g.project.id + '">' +
      '<span class="ni-dot proj-dot ' + g.project.id + '"></span>' +
      '<span class="ni-label">+ new item</span>' +
    '</div>';

    return '<section class="tree-section">' +
      '<header class="tree-header">' +
        '<span class="proj-dot ' + g.project.id + '"></span>' +
        '<span class="proj-name">' + escapeHtml(g.project.name) + '</span>' +
        '<span class="proj-progress">' + projectProgress(g.project.id) + '</span>' +
      '</header>' +
      itemsHtml +
      newRowHtml +
    '</section>';
  }).join('');

  Array.from(root.querySelectorAll('.item')).forEach(el => {
    el.addEventListener('click', (e) => {
      if (el.classList.contains('ctx-open')) return; // ignore ghost clicks while menu showing
      const id = el.dataset.itemId;
      graphCenter = id;
      renderGraph(id);
      switchView('graph');
    });
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      openCtxMenu(el.dataset.itemId, e.clientX, e.clientY, el);
    });
  });

  Array.from(root.querySelectorAll('.new-item-row')).forEach(el => {
    el.addEventListener('click', () => startNewItem(el));
  });
}

function nodeVisible(node) {
  if (!node) return false;
  if (node.type === 'project' && !settings.showProjects) return false;
  if (node.type === 'item' && !settings.showItems) return false;
  const proj = node.project || (node.type === 'project' ? String(node.id).replace('project:', '') : null);
  if (proj && settings.visibleProjects && settings.visibleProjects[proj] === false) return false;
  return true;
}

function nodeAnchorPoint(pos, fromPos) {
  const cx = pos.x + pos.w / 2;
  const cy = pos.y + pos.h / 2;
  const fcx = fromPos.x + fromPos.w / 2;
  const fcy = fromPos.y + fromPos.h / 2;
  const dx = fcx - cx;
  const dy = fcy - cy;
  if (dx === 0 && dy === 0) return { x: cx, y: cy };
  const hx = pos.w / 2;
  const hy = pos.h / 2;
  const sx = dx === 0 ? Infinity : hx / Math.abs(dx);
  const sy = dy === 0 ? Infinity : hy / Math.abs(dy);
  const s = Math.min(sx, sy);
  return { x: cx + dx * s, y: cy + dy * s };
}

function renderGraph(centerId) {
  centerId = centerId || graphCenter || (items[0] && items[0].id);
  graphCenter = centerId;
  const root = document.getElementById('view-graph');
  if (!root) return;
  const nodeById = new Map(nodes.map(n => [n.id, n]));
  const centerNode = nodeById.get(centerId);
  if (!centerNode) {
    root.innerHTML = '<p style="padding:24px;color:var(--text-3);">no node to focus on</p>';
    return;
  }
  // Adjacency over visible nodes
  const adj = new Map();
  for (const e of edges) {
    const a = nodeById.get(e.from);
    const b = nodeById.get(e.to);
    if (!a || !b) continue;
    if (!nodeVisible(a) || !nodeVisible(b)) continue;
    if (!adj.has(e.from)) adj.set(e.from, []);
    if (!adj.has(e.to)) adj.set(e.to, []);
    adj.get(e.from).push(e.to);
    adj.get(e.to).push(e.from);
  }
  const depth = settings.graphDepth === Infinity ? 99 : (settings.graphDepth || 1);
  const dist = new Map([[centerId, 0]]);
  const queue = [centerId];
  while (queue.length) {
    const cur = queue.shift();
    if (dist.get(cur) >= depth) continue;
    for (const nb of (adj.get(cur) || [])) {
      if (dist.has(nb)) continue;
      dist.set(nb, dist.get(cur) + 1);
      queue.push(nb);
    }
  }
  if (dist.size === 1) {
    ensureCyMount(root);
    document.getElementById('graph-header').innerHTML =
      '<div class="graph-title">' + escapeHtml(centerNode.label) + '</div>' +
      '<div class="graph-sub">no neighbors at depth ' + depth + ' · open ⚙ knobs to increase</div>';
    document.getElementById('cy-container').innerHTML = '';
    if (cy) { cy.destroy(); cy = null; }
    return;
  }
  // Build Cytoscape element collection
  const elements = [];
  for (const [id, d] of dist) {
    const n = nodeById.get(id);
    if (!n) continue;
    const isGhost = !!(n.provenance && n.provenance.ghost);
    // Two-line label: title on top, project · status beneath (real items only).
    // Ghosts and project hubs show just one line.
    const titleLine = truncate(n.label || n.id, 24);
    let label;
    if (isGhost || n.type === 'project') {
      label = titleLine;
    } else {
      label = titleLine + '\n' + (n.project || '') + ' · ' + (n.status || '');
    }
    elements.push({
      group: 'nodes',
      data: {
        id: n.id,
        label: label,
        type: n.type,
        status: n.status || null,
        project: n.project || null,
        ghost: isGhost,
        depth: d,
      },
      classes: idEq(id, centerId) ? 'selected' : '',
    });
  }
  const drawnEdges = edges.filter(e => dist.has(e.from) && dist.has(e.to));
  drawnEdges.forEach((e, i) => {
    elements.push({
      group: 'edges',
      data: { id: 'e' + i, source: e.from, target: e.to, kind: e.kind },
    });
  });
  // Header
  ensureCyMount(root);
  const idPrefix = centerNode.type === 'project' ? '◆ ' : '#' + displayId(centerNode.id) + ' ';
  const reachLabel = depth === 1 ? 'direct neighbors' : (depth >= 99 ? 'everything connected' : depth + ' steps out');
  document.getElementById('graph-header').innerHTML =
    '<div class="graph-title">' + idPrefix + escapeHtml(centerNode.label) + '</div>' +
    '<div class="graph-sub">' + reachLabel + ' · ' + (dist.size - 1) + ' node' + (dist.size - 1 === 1 ? '' : 's') + ' · ' + drawnEdges.length + ' link' + (drawnEdges.length === 1 ? '' : 's') + '</div>' +
    '<div class="graph-legend-inline">' +
      '<span><span class="leg-line blocks"></span>blocks</span>' +
      '<span><span class="leg-line spawned"></span>spawned</span>' +
      '<span><span class="leg-line relates"></span>relates</span>' +
      '<span><span class="leg-line belongs"></span>belongs to</span>' +
      '<span class="graph-hint">scroll to zoom · drag to pan · click a node to recenter</span>' +
    '</div>';
  // Init or update Cytoscape
  const layoutCfg = depth === 1
    ? {
        name: 'concentric',
        concentric: function(node) { return -node.data('depth'); },
        levelWidth: function() { return 1; },
        minNodeSpacing: 60,
        spacingFactor: 1.0,
        padding: 30,
        fit: false,    // keep nodes at natural size; user scrolls/zooms if needed
        animate: false,
      }
    : { name: 'cose', animate: false, idealEdgeLength: 110, nodeRepulsion: 10000, gravity: 0.15, padding: 40, fit: false };
  if (!cy) {
    cy = cytoscape({
      container: document.getElementById('cy-container'),
      elements: elements,
      style: cyStylesheet(),
      layout: layoutCfg,
      wheelSensitivity: 0.2,
    });
    cy.on('tap', 'node', function(evt) {
      const id = evt.target.id();
      if (!idEq(id, graphCenter)) renderGraph(id);
    });
    cy.on('cxttap', 'node', function(evt) {
      const id = evt.target.id();
      // Only items get the substrate ctx menu; projects do not (no provenance to correct).
      const node = nodeById.get(id);
      if (node && node.type !== 'item') return;
      const orig = evt.originalEvent || {};
      openCtxMenu(id, orig.clientX || 200, orig.clientY || 200, evt.target);
    });
    // Auto-resize when the container changes size (panel toggle, window resize, etc.)
    if (typeof ResizeObserver !== 'undefined') {
      const ro = new ResizeObserver(() => {
        if (cy) {
          cy.resize();
          const focus = cy.getElementById(graphCenter);
          if (focus && focus.length) cy.center(focus); else cy.center();
        }
      });
      ro.observe(document.getElementById('cy-container'));
    }
  } else {
    cy.elements().remove();
    cy.add(elements);
    cy.layout(layoutCfg).run();
  }
  return;
  // ---- legacy SVG path below intentionally unreachable ----
  /* unreachable: hand-rolled SVG kept only as reference until next cleanup pass
  const allPos = [];
  const pad = 0;
  const minX = 0, minY = 0, maxX = 0, maxY = 0;
  const vbW = 0, vbH = 0;
  const viewBox = '';
  root.innerHTML =
    '<div class="graph-header">' +
      '<div class="graph-title">' + escapeHtml(centerNode.label) + '</div>' +
    '</div>' +
    '<div class="graph-wrap">' +
      '<svg viewBox="' + viewBox + '" preserveAspectRatio="xMidYMid meet">' +
        '<defs>' +
          '<marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">' +
            '<path d="M0 0L10 5L0 10z" fill="#E24B4A"/>' +
          '</marker>' +
          '<marker id="arr-w" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">' +
            '<path d="M0 0L10 5L0 10z" fill="#BA7517"/>' +
          '</marker>' +
          '<marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">' +
            '<path d="M0 0L10 5L0 10z" fill="#888780"/>' +
          '</marker>' +
        '</defs>' +
        edgeSvg +
        nodesSvg +
      '</svg>' +
      '<div class="graph-legend">' +
        '<div class="leg-row"><span class="leg-line blocks"></span>blocks</div>' +
        '<div class="leg-row"><span class="leg-line spawned"></span>spawned</div>' +
        '<div class="leg-row"><span class="leg-line relates"></span>relates</div>' +
      '</div>' +
    '</div>';

  Array.from(root.querySelectorAll('.graph-node')).forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.itemId;
      if (!idEq(id, graphCenter)) renderGraph(id);
    });
  });
  */
