 * TIMELINE VIEW
 * ============================================================ */

// ---------- date helpers ----------
const WEEKDAYS_SHORT = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
const MONTHS_SHORT   = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];

function isoToParts(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return { y, m, d, dt: new Date(y, m - 1, d) };
}
function isoFor(y, m, d) {
  return y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
}
function getWeekDays(endIso) {
  const { dt } = isoToParts(endIso);
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(dt);
    d.setDate(dt.getDate() - i);
    days.push(isoFor(d.getFullYear(), d.getMonth() + 1, d.getDate()));
  }
  return days;
}
function getMonthCells(year, month1) {
  const first = new Date(year, month1 - 1, 1);
  const lastDay = new Date(year, month1, 0).getDate();
  const startWd = first.getDay();
  const cells = [];
  // leading days from previous month
  const prevLast = new Date(year, month1 - 1, 0).getDate();
  for (let i = startWd - 1; i >= 0; i--) {
    const d = prevLast - i;
    const dt = new Date(year, month1 - 2, d);
    cells.push({ iso: isoFor(dt.getFullYear(), dt.getMonth() + 1, d), day: d, inMonth: false });
  }
  // current month
  for (let d = 1; d <= lastDay; d++) {
    cells.push({ iso: isoFor(year, month1, d), day: d, inMonth: true });
  }
  // trailing to complete 6 rows (42 cells) for stable height
  let trail = 1;
  while (cells.length < 42) {
    const dt = new Date(year, month1, trail);
    cells.push({ iso: isoFor(dt.getFullYear(), dt.getMonth() + 1, trail), day: trail, inMonth: false });
    trail++;
  }
  return cells;
}
function eventsForDate(iso) {
  return events.filter(e => e.date === iso);
}
function formatWeekLabel(iso) {
  const { y, m, d, dt } = isoToParts(iso);
  return {
    wd: WEEKDAYS_SHORT[dt.getDay()],
    monthDay: MONTHS_SHORT[m - 1] + ' ' + d,
    dayNum: d,
  };
}

// ---------- timeline dispatcher ----------
function renderTimeline() {
  const root = document.getElementById('view-timeline-content');
  if (currentTimelineSub === 'list')     return renderTimelineList(root);
  if (currentTimelineSub === 'week')     return renderTimelineWeek(root);
  if (currentTimelineSub === 'calendar') return renderTimelineCalendar(root);
}

function renderTimelineList(root) {
  const grouped = [];
  for (const e of events) {
    let g = grouped.find(x => x.day === e.day);
    if (!g) { g = { day: e.day, date: e.date, events: [] }; grouped.push(g); }
    g.events.push(e);
  }
  root.innerHTML = grouped.map(g =>
    '<section class="day-section" data-date="' + g.date + '">' +
      '<header class="day-header">' + escapeHtml(g.day) + '</header>' +
      g.events.map(ev =>
        '<div class="event-row" data-item-id="' + ev.itemId + '">' +
          '<span class="event-time">' + escapeHtml(ev.time) + '</span>' +
          '<span class="event-kind ' + ev.kind + '">' + ev.kind + '</span>' +
          '<span class="event-project"><span class="proj-dot ' + ev.project + '"></span>' + ev.project + '</span>' +
          '<span class="event-desc">' + escapeHtml(ev.desc) + '</span>' +
        '</div>'
      ).join('') +
    '</section>'
  ).join('');
  Array.from(root.querySelectorAll('.event-row')).forEach(el => {
    el.addEventListener('click', () => focusItemAsGraph(el));
  });
}

function renderTimelineWeek(root) {
  const days = getWeekDays(TODAY_ISO);
  root.innerHTML = '<div class="week-grid">' + days.map(iso => {
    const label = formatWeekLabel(iso);
    const dayEvents = eventsForDate(iso);
    const isToday = iso === TODAY_ISO;
    const cellEvents = dayEvents.length
      ? dayEvents.map(ev =>
          '<div class="week-event" data-item-id="' + ev.itemId + '" title="' + escapeHtml(ev.desc) + '">' +
            '<div class="week-event-top">' +
              '<span class="we-time">' + escapeHtml(ev.time) + '</span>' +
              '<span class="we-kind ' + ev.kind + '">' + ev.kind + '</span>' +
              '<span class="proj-dot ' + ev.project + '" style="width:5px;height:5px;"></span>' +
            '</div>' +
            '<div class="week-event-desc">' + escapeHtml(ev.desc) + '</div>' +
          '</div>'
        ).join('')
      : '<div class="week-col-empty">no events</div>';
    return '<div class="week-col' + (isToday ? ' today' : '') + '">' +
      '<header class="week-col-header">' +
        '<span class="wd">' + label.wd + '</span>' +
        '<span class="dn">' + label.dayNum + '</span>' +
      '</header>' +
      cellEvents +
    '</div>';
  }).join('') + '</div>';
  Array.from(root.querySelectorAll('.week-event')).forEach(el => {
    el.addEventListener('click', () => focusItemAsGraph(el));
  });
}

function renderTimelineCalendar(root) {
  const { y, m } = isoToParts(TODAY_ISO);
  const cells = getMonthCells(y, m);
  const dayCount = events.filter(e => e.date.startsWith(y + '-' + String(m).padStart(2, '0'))).length;
  const monthLabel = MONTHS_SHORT[m - 1] + ' ' + y;
  const wdHeaders = WEEKDAYS_SHORT.map(w => '<div class="cal-weekday">' + w + '</div>').join('');
  const cellHtml = cells.map(c => {
    const evs = eventsForDate(c.iso);
    const isToday = c.iso === TODAY_ISO;
    const dots = evs.slice(0, 6).map(e => '<span class="cal-dot ' + e.kind + '" title="' + escapeHtml(e.time + ' ' + e.kind + ' · ' + e.desc) + '"></span>').join('');
    const cls = 'cal-day' + (c.inMonth ? '' : ' other-month') + (isToday ? ' today' : '') + (evs.length ? ' has-events' : '');
    return '<div class="' + cls + '" data-date="' + c.iso + '">' +
      '<span class="day-num">' + c.day + '</span>' +
      (evs.length ? '<div class="cal-events">' + dots + '</div>' : '') +
    '</div>';
  }).join('');
  root.innerHTML =
    '<div class="cal-wrap">' +
      '<header class="cal-header">' +
        '<span class="cal-title">' + monthLabel + '</span>' +
        '<span class="cal-summary">' + dayCount + ' event' + (dayCount === 1 ? '' : 's') + ' this month</span>' +
      '</header>' +
      '<div class="cal-grid">' + wdHeaders + cellHtml + '</div>' +
    '</div>';
  Array.from(root.querySelectorAll('.cal-day.has-events')).forEach(el => {
    el.addEventListener('click', () => {
      const iso = el.dataset.date;
      // drop user into list view scrolled to that day
      switchTimelineSub('list');
    });
  });
}

function focusItemAsGraph(el) {
  const id = el.dataset.itemId;
  if (!id) return;
  graphCenter = id;
  renderGraph(id);
  switchView('graph');
}

function switchTimelineSub(name) {
  currentTimelineSub = name;
  Array.from(document.querySelectorAll('.timeline-sub-btn')).forEach(b => {
    const on = b.dataset.sub === name;
    b.classList.toggle('active', on);
    b.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  renderTimeline();
  updateZoomButtons();
}

// Zoom: list (most detail) ←→ week ←→ calendar (broadest)
const ZOOM_MODES = ['list', 'week', 'calendar'];
let zoomCooldown = false;

function zoom(direction) {
  const idx = ZOOM_MODES.indexOf(currentTimelineSub);
  const next = direction === 'in'
    ? Math.max(0, idx - 1)
    : Math.min(ZOOM_MODES.length - 1, idx + 1);
  if (next === idx) return;
  if (currentView !== 'timeline') switchView('timeline');
  switchTimelineSub(ZOOM_MODES[next]);
}

function updateZoomButtons() {
  const idx = ZOOM_MODES.indexOf(currentTimelineSub);
  const inBtn  = document.querySelector('.zoom-btn[data-zoom="in"]');
  const outBtn = document.querySelector('.zoom-btn[data-zoom="out"]');
  if (inBtn)  inBtn.disabled  = idx === 0;
  if (outBtn) outBtn.disabled = idx === ZOOM_MODES.length - 1;
}

function onWheelZoom(e) {
  if (currentView !== 'timeline') return;
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  if (zoomCooldown) return;
  if (e.deltaY === 0) return;
  zoom(e.deltaY > 0 ? 'out' : 'in');
  zoomCooldown = true;
  setTimeout(() => { zoomCooldown = false; }, 320);
}

function onKeyZoom(e) {
  if (currentView !== 'timeline') return;
  // ignore when typing in a real input
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
  if (e.key === '+' || e.key === '=') { e.preventDefault(); zoom('in'); }
  else if (e.key === '-' || e.key === '_') { e.preventDefault(); zoom('out'); }
}

/* ============================================================
 * MUTATIONS (in-memory; refresh resets demo state)
 * ============================================================ */

function nextItemId() {
  // items may have substrate string ids (e.g. canon_0250) alongside locally-added numeric ids.
  // Only count numeric ids; new locally-added items keep numeric naming.
  const numericIds = items.map(i => i.id).filter(id => typeof id === 'number');
  return (numericIds.length ? Math.max.apply(null, numericIds) : 0) + 1;
}

function rerenderAll() {
  renderSidebar();
  renderTree();
  if (currentView === 'graph') renderGraph(graphCenter);
  if (currentView === 'timeline') renderTimeline();
}

function addItem(projectId, title) {
  const t = (title || '').trim();
  if (!t) return null;
  const item = {
    id: nextItemId(),
    title: t,
    project: projectId,
    status: 'open',
    time: 'today',
    links: [],
  };
  items.push(item);
  rerenderAll();
  return item;
}

async function setItemStatus(id, status) {
  const it = itemById(id);
  if (!it) return;
  if (it.status === status) return;
  // Substrate-tracked items go through Replicache (optimistic + rollback handled by lib).
  // Locally-added items mutate the in-memory array directly.
  if (typeof it.id === 'string' && /^canon_/.test(it.id) && window.latticeSync) {
    await window.latticeSync.correctStatus({
      id: it.id, status,
      originalStatus: it.status,
      originalProject: (it.provenance && it.provenance.correctedFrom) || it.project,
      originalTitle: it.title,
    });
    return;
  }
  it.status = status;
  rerenderAll();
}

function deleteItem(id) {
  const idx = items.findIndex(i => idEq(i.id, id));
  if (idx < 0) return;
  items.splice(idx, 1);
  // drop any links pointing at it
  items.forEach(it => { it.links = it.links.filter(l => !idEq(l.to, id)); });
  if (idEq(graphCenter, id)) graphCenter = FOCUS_ITEM_ID;
  rerenderAll();
}

/* ============================================================
 * INLINE NEW-ITEM
 * ============================================================ */

function startNewItem(rowEl) {
  if (rowEl.classList.contains('editing')) return;
  const project = rowEl.dataset.project;
  rowEl.classList.add('editing');
  rowEl.innerHTML =
    '<span class="ni-dot proj-dot ' + project + '"></span>' +
    '<input class="ni-input" placeholder="describe the item, press enter to add" />' +
    '<span class="ni-hint">enter to save · esc to cancel</span>';
  const input = rowEl.querySelector('.ni-input');
  input.focus();
  const commit = () => {
    const title = input.value;
    if (title.trim()) addItem(project, title);
    else cancelNewItem(rowEl);
  };
  const cancel = () => cancelNewItem(rowEl);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  input.addEventListener('blur', () => {
    // small delay so click on hint doesn't race
    setTimeout(() => { if (rowEl.isConnected && rowEl.classList.contains('editing')) commit(); }, 80);
  });
}

function cancelNewItem(rowEl) {
  rowEl.classList.remove('editing');
  const project = rowEl.dataset.project;
  rowEl.innerHTML =
    '<span class="ni-dot proj-dot ' + project + '"></span>' +
    '<span class="ni-label">+ new item</span>';
}

/* ============================================================
 * CONTEXT MENU
 * ============================================================ */

let ctxOpenItemId = null;
let ctxOpenSourceEl = null;
let ctxLeaveTimer = null;
// Compact = pip+pill rows · Expanded = stacked labeled buttons. Sticky via localStorage.
let ctxMode = (function() {
  try { return localStorage.getItem('lattice.ctxMode') || 'compact'; }
  catch (_) { return 'compact'; }
})();
function setCtxMode(mode) {
  ctxMode = mode;
  try { localStorage.setItem('lattice.ctxMode', mode); } catch (_) {}
}

function openCtxMenu(itemId, x, y, sourceEl) {
  const item = itemById(itemId);
  if (!item) return;
  closeCtxMenu();
  ctxOpenItemId = itemId;
  ctxOpenSourceEl = sourceEl;
  if (sourceEl) sourceEl.classList.add('ctx-open');

  const menu = document.getElementById('ctx-menu');
  renderCtxMenuBody(menu, item);

  // place, then clamp to viewport
  menu.hidden = false;
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
  const rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth - 8)  menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
  if (rect.bottom > window.innerHeight - 8) menu.style.top  = (window.innerHeight - rect.height - 8) + 'px';

  bindCtxMenuActions(menu);

  // Mouse-leave auto-close (500ms grace; reset on re-entry)
  menu.addEventListener('mouseenter', () => {
    if (ctxLeaveTimer) { clearTimeout(ctxLeaveTimer); ctxLeaveTimer = null; }
  });
  menu.addEventListener('mouseleave', () => {
    if (ctxLeaveTimer) clearTimeout(ctxLeaveTimer);
    ctxLeaveTimer = setTimeout(() => { closeCtxMenu(); }, 500);
  });
}

function renderCtxMenuBody(menu, item) {
  const statusOptions = ['open', 'active', 'blocked', 'done', 'dropped'];
  // Provenance header line
  const prov = item.provenance || { source: 'local' };
  let provLabel;
  if (prov.source === 'cognitive-sensor.idea_registry') provLabel = 'from cognitive-sensor';
  else if (prov.source === 'user') provLabel = prov.correctedFrom ? ('corrected · was ' + prov.correctedFrom) : 'your edit';
  else if (prov.source === 'optogon') provLabel = 'from optogon';
  else if (prov.source === 'ghost_executor') provLabel = 'from ghost executor';
  else provLabel = 'local';
  const toggleGlyph = ctxMode === 'compact' ? '⤢' : '⤡';
  const toggleTitle = ctxMode === 'compact' ? 'expand · show full labels' : 'collapse · compact view';
  const provHeader =
    '<div class="ctx-prov">' +
      '<span>' + provLabel + '</span>' +
      '<span class="ctx-mode-toggle" data-action="toggle-mode" title="' + toggleTitle + '">' + toggleGlyph + '</span>' +
    '</div>';

  let body;
  if (ctxMode === 'expanded') {
    const statusBtns = statusOptions.map(s =>
      '<button class="ctx-btn' + (item.status === s ? ' checked' : '') + '" data-action="status" data-value="' + s + '">' +
        '<span class="ctx-dot ' + s + '"></span>' + s +
      '</button>'
    ).join('');
    const projectBtns = projects.map(p =>
      '<button class="ctx-btn' + (item.project === p.id ? ' checked' : '') + '" data-action="project" data-value="' + p.id + '">' +
        '<span class="ctx-dot proj-dot ' + p.id + '"></span>' + p.name +
      '</button>'
    ).join('');
    body =
      '<div class="ctx-section">project</div>' + projectBtns +
      '<div class="ctx-divider"></div>' +
      '<div class="ctx-section">status</div>' + statusBtns;
  } else {
    const statusRow = statusOptions.map(s =>
      '<span class="ctx-stat' + (item.status === s ? ' checked' : '') + '" data-action="status" data-value="' + s + '" title="' + s + '">' + s + '</span>'
    ).join('');
    const projectRow = projects.map(p =>
      '<span class="ctx-pip proj-dot ' + p.id + (item.project === p.id ? ' checked' : '') + '" data-action="project" data-value="' + p.id + '" data-name="' + p.name + '" title="' + p.name + '"></span>'
    ).join('');
    const currentProjectName = (projects.find(p => p.id === item.project) || {}).name || item.project;
    body =
      '<div class="ctx-row"><span class="ctx-row-label">project</span>' + projectRow + '</div>' +
      '<div class="ctx-current" id="ctx-current-project" data-default="' + currentProjectName + '">' + currentProjectName + '</div>' +
      '<div class="ctx-row"><span class="ctx-row-label">status</span>' + statusRow + '</div>';
  }

  menu.innerHTML =
    provHeader +
    body +
    '<div class="ctx-divider"></div>' +
    '<button class="ctx-btn" data-action="graph">show in graph</button>' +
    '<button class="ctx-btn danger" data-action="delete">delete item</button>';
}

function bindCtxMenuActions(menu) {
  Array.from(menu.querySelectorAll('[data-action]')).forEach(b => {
    b.addEventListener('click', (ev) => {
      if (b.dataset.action === 'toggle-mode') {
        ev.stopPropagation();
        setCtxMode(ctxMode === 'compact' ? 'expanded' : 'compact');
        const item = itemById(ctxOpenItemId);
        if (!item) return;
        renderCtxMenuBody(menu, item);
        bindCtxMenuActions(menu);
        return;
      }
      handleCtxAction(b.dataset.action, b.dataset.value);
    });
  });
  // Project pip hover -> show that project's name in the .ctx-current row;
  // leave -> revert to the currently-set project's name.
  const currentEl = menu.querySelector('#ctx-current-project');
  if (currentEl) {
    Array.from(menu.querySelectorAll('.ctx-pip[data-action="project"]')).forEach(pip => {
      pip.addEventListener('mouseenter', () => {
        currentEl.textContent = pip.dataset.name || '';
        currentEl.classList.add('preview');
      });
      pip.addEventListener('mouseleave', () => {
        currentEl.textContent = currentEl.dataset.default || '';
        currentEl.classList.remove('preview');
      });
    });
  }
}

function closeCtxMenu() {
  if (ctxLeaveTimer) { clearTimeout(ctxLeaveTimer); ctxLeaveTimer = null; }
  const menu = document.getElementById('ctx-menu');
  menu.hidden = true;
  menu.innerHTML = '';
  if (ctxOpenSourceEl) ctxOpenSourceEl.classList.remove('ctx-open');
  ctxOpenItemId = null;
  ctxOpenSourceEl = null;
}

function handleCtxAction(action, value) {
  const id = ctxOpenItemId;
  closeCtxMenu();
  if (id == null) return;
  if (action === 'status') setItemStatus(id, value);
  else if (action === 'project') setItemProject(id, value);
  else if (action === 'graph') {
    graphCenter = id;
    renderGraph(id);
    switchView('graph');
  }
  else if (action === 'delete') deleteItem(id);
}

async function setItemProject(id, newProject) {
  const item = itemById(id);
  if (!item) return;
  if (item.project === newProject) return;
  if (typeof item.id === 'string' && /^canon_/.test(item.id) && window.latticeSync) {
    await window.latticeSync.correctProject({
      id: item.id, project: newProject,
      originalProject: (item.provenance && item.provenance.correctedFrom) || item.project,
      originalStatus: item.status,
      originalTitle: item.title,
    });
    return;
  }
  item.project = newProject;
  rerenderAll();
}

function setupSettingsPanel() {
  const panel = document.getElementById('settings-panel');
  const btn = document.getElementById('settings-btn');
  if (!panel || !btn) return;
  // Apply view-specific visibility on init too (not just on switchView clicks)
  btn.hidden = (currentView !== 'graph');
  panel.hidden = (currentView !== 'graph');
  // Initialize controls from current settings
  const depthVal = settings.graphDepth === Infinity ? 'all' : String(settings.graphDepth || 1);
  Array.from(panel.querySelectorAll('input[name="depth"]')).forEach(r => { r.checked = r.value === depthVal; });
  Array.from(panel.querySelectorAll('input[data-knob]')).forEach(c => { c.checked = !!settings[c.dataset.knob]; });
  Array.from(panel.querySelectorAll('input[data-source]')).forEach(c => { c.checked = !!(settings.sources && settings.sources[c.dataset.source]); });
  // Toggle visibility
  btn.addEventListener('click', () => { panel.hidden = !panel.hidden; });
  // Wire changes
  panel.addEventListener('change', async (e) => {
    const t = e.target;
    if (t.name === 'depth') {
      settings.graphDepth = t.value === 'all' ? Infinity : parseInt(t.value, 10);
    } else if (t.dataset.knob) {
      settings[t.dataset.knob] = t.checked;
    } else if (t.dataset.source) {
      settings.sources = Object.assign({}, settings.sources, { [t.dataset.source]: t.checked });
    }
    saveSettings();
    // Re-derive locally and re-render the active view
    nodes = deriveNodes();
    edges = deriveEdges();
    rerenderAll();
  });
}

function jumpToToday() {
  if (currentView !== 'timeline') switchView('timeline');
  // Anchor selectors per sub-mode
  const anchorSelectors = {
    list:     '.day-section[data-date="' + TODAY_ISO + '"]',
    week:     '.week-col.today',
    calendar: '.cal-day.today',
  };
  // Defer to next frame so DOM is settled
  requestAnimationFrame(() => {
    const el = document.querySelector(anchorSelectors[currentTimelineSub]);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: currentTimelineSub === 'list' ? 'start' : 'center' });
    el.classList.remove('today-flash');
    void el.offsetWidth; // force reflow so the animation re-triggers
    el.classList.add('today-flash');
  });
}

/* ============================================================
 * VIEW SWITCHING
 * ============================================================ */

function switchView(name) {
  currentView = name;
  Array.from(document.querySelectorAll('.view-btn')).forEach(b => {
    const on = b.dataset.view === name;
    b.classList.toggle('active', on);
    b.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  Array.from(document.querySelectorAll('.view')).forEach(v => {
    v.classList.toggle('active', v.id === 'view-' + name);
  });
  // Knobs are graph-specific. On graph view, the panel auto-shows so the
  // knobs are visible without a click. On tree/timeline, both button + panel hide.
  const knobsBtn = document.getElementById('settings-btn');
  const panel = document.getElementById('settings-panel');
  if (knobsBtn) knobsBtn.hidden = (name !== 'graph');
  if (panel) panel.hidden = (name !== 'graph');
  // Cytoscape needs a viewport recalc when its container becomes visible.
  // First entry into graph (cy not yet built) triggers a full renderGraph so
  // the substrate-fed data hits the canvas; subsequent entries just resize.
  if (name === 'graph') {
    if (!cy) {
      renderGraph(graphCenter || FOCUS_ITEM_ID || (items[0] && items[0].id));
    } else {
      setTimeout(() => {
        cy.resize();
        const focus = cy.getElementById(graphCenter);
        if (focus && focus.length) cy.center(focus); else cy.center();
      }, 80);
    }
  }
}

/* ============================================================
 * ITEM BACKBONE (brick 2) — surface the unified /items feed
 * atlas-map-api :3072 aggregates droplist/cycleboard/inpact into one
 * feed; merge it into items[]/projects[] so all surfaces' items render
 * in one pane, grouped by source. Additive + idempotent so it coexists
 * with the Replicache/delta-kernel viewmodel sync. Graceful if :3072 down.
 * ============================================================ */
const ATLAS_MAP_API = 'http://127.0.0.1:3072';
var backboneItems = [];
var backboneSources = [];
function mapBackboneItem(it) {
  return {
    id: 'bb:' + it.source + ':' + it.id,
    title: it.title || it.id,
    project: it.source,
    status: it.status || 'open',
    time: it.updated || '',
    provenance: { source: 'backbone:' + it.source, kind: it.kind, ref: it.ref },
    links: [],
  };
}
// Union the backbone feed into any base array. The Replicache onData handler
// REPLACES window.items/projects on every pull, so the merge must be re-applied
// there (not just at boot) or a delta-kernel recovery silently wipes the feed.
// Dedup by id; backbone ids are 'bb:'-prefixed so they never collide.
window.mergeBackboneItems = function (base) {
  if (!backboneItems.length) return base;
  const out = (base || []).slice();
  const ids = new Set(out.map(i => i.id));
  for (const bi of backboneItems) if (!ids.has(bi.id)) { out.push(bi); ids.add(bi.id); }
  return out;
};
window.mergeBackboneProjects = function (base) {
  if (!backboneSources.length) return base;
  const out = (base || []).slice();
  const have = new Set(out.map(p => p.id));
  for (const src of backboneSources) if (!have.has(src)) { out.push({ id: src, name: src }); have.add(src); }
  return out;
};
async function loadBackbone() {
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 1500);
    const r = await fetch(ATLAS_MAP_API + '/items', { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) return;
    const data = await r.json();
    backboneItems = (data.items || []).map(mapBackboneItem);
    backboneSources = Object.keys(data.by_source || {});
    window.items = window.mergeBackboneItems(window.items || items);
    window.projects = window.mergeBackboneProjects(window.projects || projects);
    if (typeof window.rerenderAll === 'function') window.rerenderAll();
    else { renderSidebar(); renderTree(); renderGraph(typeof FOCUS_ITEM_ID !== 'undefined' ? FOCUS_ITEM_ID : null); renderTimeline(); }
  } catch (_) { /* graceful: :3072 unreachable → lattice unchanged */ }
}

/* ============================================================
 * INIT
 * ============================================================ */

document.addEventListener('DOMContentLoaded', async () => {
  // Wait for the Replicache module-script to finish boot + first pull.
  // It exposes window.latticeSync.{items,projects,events,nodes,edges,ready,...}.
  const sync = await syncReady();
  // sync subscriptions write through to the in-page arrays on every change
  // and call rerenderAll() automatically; the initial render below is the
  // first pass with whatever was already on disk (IDB cache) + first pull.

  renderSidebar();
  renderTree();
  renderGraph(FOCUS_ITEM_ID);
  renderTimeline();

  loadBackbone();  // brick 2: merge the unified /items feed into the views

  Array.from(document.querySelectorAll('.view-btn')).forEach(b => {
    b.addEventListener('click', () => switchView(b.dataset.view));
  });
  Array.from(document.querySelectorAll('.timeline-sub-btn')).forEach(b => {
    b.addEventListener('click', () => switchTimelineSub(b.dataset.sub));
  });
  document.getElementById('today-btn').addEventListener('click', jumpToToday);
  setupSettingsPanel();
  Array.from(document.querySelectorAll('.zoom-btn')).forEach(b => {
    b.addEventListener('click', () => zoom(b.dataset.zoom));
  });
  window.addEventListener('wheel', onWheelZoom, { passive: false });
  window.addEventListener('keydown', onKeyZoom);
  updateZoomButtons();

  // context menu: close on outside click or escape
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('ctx-menu');
    if (!menu.hidden && !menu.contains(e.target)) closeCtxMenu();
  });
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeCtxMenu();
  });
  window.addEventListener('scroll', closeCtxMenu, true);
  window.addEventListener('resize', closeCtxMenu);

  // Re-render graph + timeline when crossing the mobile breakpoint so layouts swap
  const mq = window.matchMedia('(max-width: 599px)');
  const onMqChange = () => {
    renderGraph(graphCenter);
    renderTimeline();
  };
  if (mq.addEventListener) mq.addEventListener('change', onMqChange);
  else mq.addListener(onMqChange);
});
</script>

<script type="module">
// Replicache sync seam (Week 1 of NEXT_SESSION_HANDOFF.md).
// Pull: GET /api/lattice/viewmodel → PullResponse patch keyed by entity type.
// Push: POST /api/lattice/correct, one per queued mutation.
// Mutators (correctProject, correctStatus) run optimistically locally, then
// replay on top of every pull until lastMutationIDChanges acks them.
import { Replicache, TEST_LICENSE_KEY } from './replicache.bundle.mjs';
const z = window.Zod;

const ATLAS_BASE = 'http://127.0.0.1:3001';
const ViewmodelZ = z.object({
  items: z.array(z.object({
    id: z.string(), title: z.string(), project: z.string(),
    status: z.enum(['open','active','blocked','done','dropped']),
    time: z.string(), links: z.array(z.any()), provenance: z.any(),
  })),
  events: z.array(z.any()), projects: z.array(z.any()),
  nodes: z.array(z.any()), edges: z.array(z.any()),
});

let atlasToken = null;
async function refreshToken() {
  try {
    const r = await fetch(ATLAS_BASE + '/api/auth/token');
    return r.ok ? (await r.json()).token : null;
  } catch { return null; }
}
function authHeaders() {
  const h = { 'Content-Type': 'application/json' };
  if (atlasToken) h.Authorization = 'Bearer ' + atlasToken;
  return h;
}
atlasToken = await refreshToken();

// Per-client mutation ack — fed back via lastMutationIDChanges so
// Replicache drops processed mutations from its optimistic queue.
const acked = {};
let repHandle = null;
function ack(m) {
  if (!m || !m.clientID || typeof m.id !== 'number') return;
  if ((acked[m.clientID] || 0) < m.id) acked[m.clientID] = m.id;
}

async function customPuller() {
  // Date.now cookie is monotonic across reloads (an in-memory counter
  // would reset to 0 while IDB still holds the prior session's high cookie).
  const cookie = Date.now();
  try {
    const r = await fetch(ATLAS_BASE + '/api/lattice/viewmodel', { headers: authHeaders() });
    if (!r.ok) {
      if (r.status === 401) atlasToken = await refreshToken();
      return { httpRequestInfo: { httpStatusCode: r.status, errorMessage: 'viewmodel' } };
    }
    const body = await r.json();
    if (!body?.ok || !body.viewmodel) return { httpRequestInfo: { httpStatusCode: 200, errorMessage: 'empty' } };
    const vm = ViewmodelZ.parse(body.viewmodel);
    const patch = [{ op: 'clear' }];
    for (const it of vm.items)    patch.push({ op: 'put', key: 'item/'    + it.id, value: it });
    for (const p  of vm.projects) patch.push({ op: 'put', key: 'project/' + p.id,  value: p  });
    vm.events.forEach((ev, i) => patch.push({ op: 'put', key: 'event/' + i, value: ev }));
    vm.nodes.forEach((n, i)   => patch.push({ op: 'put', key: 'node/'  + i, value: n  }));
    vm.edges.forEach((e, i)   => patch.push({ op: 'put', key: 'edge/'  + i, value: e  }));
    return {
      response: { cookie, lastMutationIDChanges: { ...acked }, patch },
      httpRequestInfo: { httpStatusCode: 200, errorMessage: '' },
    };
  } catch (e) {
    return { httpRequestInfo: { httpStatusCode: 0, errorMessage: String(e?.message || e) } };
  }
}

// Pusher receives the already-parsed PushRequest body in Replicache 15+
// (not a Fetch Request). 2xx/4xx → ack; 5xx/network error → no ack, retried.
async function customPusher(reqBody) {
  const muts = reqBody?.mutations || [];
  for (const m of muts) {
    if (m.name !== 'correctProject' && m.name !== 'correctStatus') { ack(m); continue; }
    const a = m.args || {};
    const body = {
      id: a.id, originalProject: a.originalProject,
      originalStatus: a.originalStatus, originalTitle: a.originalTitle,
    };
    if (m.name === 'correctProject') body.project = a.project; else body.status = a.status;
    try {
      const r = await fetch(ATLAS_BASE + '/api/lattice/correct', {
        method: 'POST', headers: authHeaders(), body: JSON.stringify(body),
      });
      if (r.status >= 500) return { httpRequestInfo: { httpStatusCode: r.status, errorMessage: 'correct 5xx' } };
      if (r.status === 401) atlasToken = await refreshToken();
      ack(m);
    } catch (e) {
      return { httpRequestInfo: { httpStatusCode: 0, errorMessage: String(e?.message || e) } };
    }
  }
  // Auto-pull after push so the ack lands fast — otherwise the optimistic
  // mutation re-applies on every pull until the 30s pullInterval fires.
  if (muts.length && repHandle) setTimeout(() => repHandle.pull().catch(() => {}), 50);
  return { httpRequestInfo: { httpStatusCode: 200, errorMessage: '' } };
}

const nowIso = () => new Date().toISOString();
const mutators = {
  correctProject: async (tx, args) => {
    const it = await tx.get('item/' + args.id);
    if (!it) return;
    await tx.set('item/' + args.id, { ...it, project: args.project,
      provenance: { source: 'user', correctedFrom: it.project, correctedAt: nowIso() }});
  },
  correctStatus: async (tx, args) => {
    const it = await tx.get('item/' + args.id);
    if (!it) return;
    await tx.set('item/' + args.id, { ...it, status: args.status,
      provenance: { source: 'user', correctedFrom: 'status=' + it.status, correctedAt: nowIso() }});
  },
};

const rep = new Replicache({
  name: 'lattice-bruke-v1', licenseKey: TEST_LICENSE_KEY,
  // pull/pushURL must be non-empty for Replicache 15 to wire the custom hooks
  // (it builds an internal Request even when puller/pusher are overridden).
  pullURL: ATLAS_BASE + '/api/lattice/viewmodel',
  pushURL: ATLAS_BASE + '/api/lattice/correct',
  puller: customPuller, pusher: customPusher,
  pullInterval: 30000, mutators,
});
repHandle = rep;

const DEFAULT_PROJECTS = [
  { id: 'lattice', name: 'lattice' }, { id: 'optogon', name: 'optogon' },
  { id: 'atlas', name: 'atlas' }, { id: 'inpact', name: 'inpact' },
  { id: 'property', name: 'property' }, { id: 'music', name: 'music' },
];
async function snapshotAll(tx) {
  const out = { items: [], projects: [], events: [], nodes: [], edges: [] };
  for await (const [key, val] of tx.scan().entries()) {
    if      (key.startsWith('item/'))    out.items.push(val);
    else if (key.startsWith('project/')) out.projects.push(val);
    else if (key.startsWith('event/'))   out.events.push(val);
    else if (key.startsWith('node/'))    out.nodes.push(val);
    else if (key.startsWith('edge/'))    out.edges.push(val);
  }
  return out;
}

let resolveReady;
const ready = new Promise(r => { resolveReady = r; });
let readyFired = false;
// Time-bound the cold-start wait so the page renders its shell even if
// the server is offline (otherwise syncReady() hangs forever).
const readyTimer = setTimeout(() => {
  if (!readyFired) { readyFired = true; resolveReady(); window.dispatchEvent(new CustomEvent('lattice:sync-ready')); }
}, 4000);

rep.subscribe(snapshotAll, { onData: (snap) => {
  // Ghost-stub nodes for link endpoints not present in the projection.
  const have = new Set(snap.nodes.map(n => n.id));
  for (const e of snap.edges) for (const id of [e.from, e.to]) {
    if (have.has(id)) continue;
    have.add(id);
    snap.nodes.push({ id, type: 'item', label: String(id).replace(/^canon_/, '#'),
      status: 'open', provenance: { source: 'cognitive-sensor.idea_registry', ghost: true }});
  }
  window.events = snap.events; window.nodes = snap.nodes; window.edges = snap.edges;
  const baseProjects = snap.projects.length ? snap.projects : DEFAULT_PROJECTS;
  // Brick 2: re-union the backbone feed on every pull so a delta-kernel
  // recovery (which replaces these arrays) never drops it.
  window.items = (typeof window.mergeBackboneItems === 'function') ? window.mergeBackboneItems(snap.items) : snap.items;
  window.projects = (typeof window.mergeBackboneProjects === 'function') ? window.mergeBackboneProjects(baseProjects) : baseProjects;
  if (snap.items.length && window.FOCUS_ITEM_ID == null) window.FOCUS_ITEM_ID = snap.items[0].id;
  if (typeof window.rerenderAll === 'function') { try { window.rerenderAll(); } catch (e) { console.warn('rerender:', e); } }
  // First subscribe fire happens with empty IDB on cold start; only resolve
  // ready once real data has actually landed.
  if (!readyFired && snap.items.length > 0) {
    readyFired = true; clearTimeout(readyTimer); resolveReady();
    window.dispatchEvent(new CustomEvent('lattice:sync-ready'));
  }
}});

window.latticeSync = {
  ready, rep,
  correctProject: (args) => rep.mutate.correctProject(args),
  correctStatus:  (args) => rep.mutate.correctStatus(args),
  pull: () => rep.pull(), push: () => rep.push(),
};

rep.pull().catch(() => {});
</script>
</body>
