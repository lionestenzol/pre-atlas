surfaces:
  inpact:
    props:
      path: apps/inpact
      lang: js
      port: 3006 (static)
      loc: 11066
      lifecycle: active
    renders: daily-flow · onboarding · cycleboard
    calls:
    - delta-kernel GET /api/cycleboard → the governance blob it renders
    - delta-kernel (daily-brief / state / signals family)
    - cortex POST /inpact/run/{module} → proposes/executes module actions
    needs:
    - cycleboard blob shape
    - 6-mode enum
    - Bearer key from /api/auth/token
  lattice:
    props:
      path: apps/lattice
      lang: js
      port: 3011 (static)
      loc: 12506
      lifecycle: active
    renders: viewmodel projection · tree/graph/timeline (vendors Cytoscape)
    calls:
    - delta-kernel GET /api/lattice/viewmodel → the projection it renders
    - delta-kernel POST /api/lattice/correct → write-back correction loop (load-bearing)
    - delta-kernel GET /api/auth/token, GET /items, GET item/{id}
    - cognitive-sensor (idea/loop data)
    needs:
    - viewmodel shape (AtlasArtifact.v1 / lattice viewmodel)
    - item backbone shape
    note: apps/lattice also mirrors audit/system-map-data.js (a generated DATA snapshot — not live wiring).
  atlas-setup:
    props:
      path: atlas-setup.html (served by atlas-shell :8888)
      lifecycle: active
    renders: clickable boot page — preset/per-service start-stop grid + pick-your-LLM box + write-token fetch
    calls:
    - atlas-map-api GET /map/launchables, POST /map/{start,stop,restart,halt}/{name}
    - delta-kernel GET /api/auth/token (write token)
    note: Atlas Setup (setup/ folder, apply.py) writes one profile → delta-kernel /api/cycleboard (the hub all surfaces read).
  delta-scp-web:
    props:
      path: apps/delta-scp-web
      port: 5174 (vite)
      lifecycle: active
    renders: SaaS UI over delta-scp
    calls:
    - delta-scp demo-server :3012
  hydra:
