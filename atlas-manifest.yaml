    openclaw, optogon, search-stack, triangulation, uasc-executor]
  no_rest_surface: [ws-gateway]
  port_drift_resolved: ['aegis-fabric: system-index port 3010 -> runtime 3002 (launch.json)', 'canvas-engine: system-index port 3060 -> runtime 3050 (launch.json)', 'triangulation: system-index port 3010
      -> runtime 3075 (launch.json)', 'ws-gateway: system-index port 3006 -> runtime 3011 (launch.json)']
