# =============================================================================
# atlas-manifest.yaml — Atlas system manifest (interface-first)
#
#   GENERATED FILE — do not hand-edit. Regenerate with:
#       python audit/build_atlas_manifest.py
#   Curated knowledge (UI calls, store shapes, contract ownership, roles) lives
#   in audit/manifest-overlay.yaml. Mechanical facts (ports, routes, loc, deps,
#   seams, contracts) are re-derived from system-index.json + atlas-map.json +
#   .claude/launch.json + a source route sweep every run.
#
# PURPOSE: one compact, complete map of ALL of Atlas, sized to upload to an LLM
#   so it reasons about real structure without cherry-picking. INTERFACE, not
#   implementation. Reads the filesystem (not git) — gitignored stores included.
# HOW TO READ: provides = API surface you can ASK · consumes = who it calls ·
#   requires = auth needed · speaks = contracts · port = RUNTIME (launch.json).
# =============================================================================

meta:
  name: Atlas (Pre Atlas)
  one_liner: Personal behavioral-governance system — a federated monorepo.
  architecture: hub-and-spoke over SQLite + one-way HTTP seams; JSON-Schema contracts are the wire format. NOT an event bus.
  hub: delta-kernel
  fsm_modes:
  - RECOVER
  - CLOSURE
  - MAINTENANCE
  - BUILD
  - COMPOUND
  - SCALE
  repo_root: C:/Users/bruke/Pre Atlas
  sibling_repo: C:/Users/bruke/pre-atlas (hyphen) — hosts delta-scp; folded in as a node
  totals: {systems_in_manifest: 22, services: 19, apps: 7, owned_loc_approx: 253295, contracts: 50}
  generated_at: '2026-06-28'
  generator: audit/build_atlas_manifest.py (deterministic; edit audit/manifest-overlay.yaml for curated bits)
spine_loop:
  flow: cognitive-sensor (analyze) → optogon/cortex (propose/execute, GATED) → droplist (packetize) → delta-kernel (commit state) → lattice/inpact (project)
  note: Seams are reads or signal-writes. cortex/optogon act only behind default-off env flags.
