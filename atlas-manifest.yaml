# =============================================================================
# atlas-manifest.yaml — Atlas system manifest (interface-first)
# =============================================================================
# PURPOSE
#   One compact, complete, machine-ingestible map of the ENTIRE Atlas system,
#   built so an LLM (or Atlas-as-agent) can reason about real structure without
#   guessing or cherry-picking. It captures INTERFACE, not implementation:
#   what each surface/UI asks each backend, what each API provides, what data
#   each thing requires, and what contract governs each seam.
#
# WHY THIS EXISTS (and why git/prose fail)
#   - A GitHub upload misses gitignored state (SQLite DBs, JSON dumps, .env).
#     This manifest was built by reading the FILESYSTEM, not git — nothing hidden.
#   - Prose describes implementation and is too big. This describes interfaces,
#     collapsing ~302K owned LOC into a few thousand lines you can hold at once.
#
# HOW TO READ
#   - `provides`  = the API surface you can ASK a system (verified route list).
#   - `consumes`  = which other systems this one calls (from service_edges + env).
#   - `requires`  = auth / data a caller must supply.
#   - `speaks`    = JSON-Schema contracts this system produces/consumes (see §contracts).
#   - `port`      = RUNTIME port from .claude/launch.json (the boot truth), which
#                   overrides code-default drift in audit/system-index.json.
#   - `verified`  = how the node was grounded (see §verification for the legend).
#
# PROVENANCE (all first-hand, 2026-06-25)
#   identity/loc/deps  ← audit/system-index.json (machine-generated)
#   purposes/lifecycle ← atlas-map.json + REPO_RUNDOWN.md (reconciled)
#   runtime ports      ← .claude/launch.json
#   provides (routes)  ← rg sweep of route decorators/registrations (paths starting "/")
#   seams              ← atlas-map.json service_edges + launch.json env vars
#   contracts          ← contracts/schemas/*.v1.json (50 files)
# =============================================================================

meta:
  name: Atlas (Pre Atlas)
  one_liner: "Personal behavioral-governance system — a federated monorepo."
  architecture: "hub-and-spoke over SQLite + one-way HTTP seams; JSON-Schema contracts are the wire format. NOT an event bus."
  hub: delta-kernel
  fsm_modes: [RECOVER, CLOSURE, MAINTENANCE, BUILD, COMPOUND, SCALE]
  repo_root: "C:/Users/bruke/Pre Atlas"
  sibling_repo: "C:/Users/bruke/pre-atlas (hyphen) — hosts delta-scp; folded in as a node"
  totals: { owned_systems: 35, owned_files: ~3400, owned_loc: ~302000, contracts: 50 }
  generated_at: "2026-06-25"
  generator: "groundwork pipeline (delta-scp orient + code-recon verify + manual assemble)"

# -----------------------------------------------------------------------------
# spine_loop — the capture→act→reflect cycle (most automation is gated OFF)
# -----------------------------------------------------------------------------
spine_loop:
  flow: "cognitive-sensor (analyze) → optogon/cortex (propose/execute, GATED) → droplist (packetize) → delta-kernel (commit state) → lattice/inpact (project)"
  note: "Seams are reads or signal-writes. cortex/optogon act only behind default-off env flags."

# -----------------------------------------------------------------------------
# runtime_ports — the boot truth (.claude/launch.json). Authoritative.
# -----------------------------------------------------------------------------
runtime_ports:
  backends:
    delta-kernel: 3001          # + delta-web (vite) 5173
    aegis-fabric: 3002          # + aegis-landing (static) 8890
    openclaw: 3004              # legacy
    mosaic-orchestrator: 3005   # legacy
    inpact: 3006                # static http-server of apps/inpact
    code-converter: 3007
    uasc-executor: 3008
    cortex: 3009                # + cortex-dashboard (static) 8891
    optogon: 3010
    lattice: 3011               # static http-server of apps/lattice
    delta-scp: 3012             # CROSS-REPO: C:/Users/bruke/pre-atlas/services/delta-scp
    canvas-engine: 3050
    search-stack: 3070
    memory-hub: 3071
    atlas-map-api: 3072
    droplist: 3073
    triangulation: 3075         # stub
    mosaic-dashboard: 3000      # legacy
    blueprint-generator: 3030   # legacy
    ai-exec-pipeline: 5000      # legacy
    cognitive-sensor-triage: 8765
    hydra-engine: 8899
  static_shell_servers:
    atlas-shell: 8888           # serves repo root incl. atlas-setup.html
    cognitive-sensor-threadcards: 8893
    anatomy: 8894
    audit-map: 8897
    hydra: 8898
    delta-scp-web: 5174
  drift_notes:
    - "system-index.json shows canvas-engine 3060, cortex/optogon null, aegis 3010, triangulation 3010 — all stale code-defaults. launch.json above is runtime truth."
    - "Latent (not active): aegis gateway subpkg + triangulation both code-default to 3010 (optogon owns it at runtime). No live collision; harden the two stale defaults."
    - "ws-gateway code-default 3006 == inpact runtime 3006, but ws-gateway is not autostarted → no live collision."

