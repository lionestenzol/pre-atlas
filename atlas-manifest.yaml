  location: contracts/schemas/
  by_domain:
    delta_kernel_core: [Signal.v1, CloseSignal.v1, Directive.v1, DirectiveProposed, ModeContract.v1, CompoundState.v1, DailyPayload.v1, DailyProjection.v1, AtlasArtifact.v1, Closures.v1, WorkLedger.v1, AutomationQueue.v1, WorkflowEvent.v1]
    aegis_fabric:      [AegisAgent.v1, AegisAgentAction.v1, AegisApproval.v1, AegisPolicy.v1, AegisPolicyDecision.v1, AegisTenant.v1, AegisWebhook.v1, MeteringUsage.v1]
    execution_cortex_droplist: [CortexTask.v1, TaskPrompt.v1, TaskExecution.v1, ExecutionSpec.v1, ExecutionResult.v1, BuildOutput.v1, ContextPackage.v1, ProjectGoal.v1, ValidationVerdict.v1, RiskMitigation.v1]
    optogon:           [OptogonNode.v1, OptogonPath.v1, OptogonSessionState.v1]
    cognitive_sensor:  [IdeaRegistry.v1, IdeasClassified.v1, IdeasDeduplicated.v1, ExcavatedIdeas.v1, CognitiveMetricsComputed, AnalystDecision.v1, TimelineEvents.v1]
    life_state_signals: [LifeSignals.v1, EnergyLog.v1, FinancialLedger.v1, NetworkRegistry.v1, SkillRegistry.v1, UserPreferenceStore.v1]
    other:             [SimulationReport.v1 (mirofish), OrchestratorEvent.v1 (mosaic), AnatomyV1.v1 (anatomy)]
  key_contracts:
    Signal.v1:       "the canonical state-mutation message ingested by delta-kernel /api/signals/ingest"
    Directive.v1:    "what optogon/cortex propose; delta-kernel commits"
    AtlasArtifact.v1: "the /show ↔ lattice wire (sibling of Signal.v1)"
    CloseSignal.v1:  "loop-closure event"

# =============================================================================
# seams — the directed edge graph (atlas-map.json service_edges, annotated)
#   "A → B" = A calls/depends on B. Endpoint added where verified.
# =============================================================================
seams:
  into_hub:
    - "lattice   → delta-kernel : GET /api/lattice/viewmodel, POST /api/lattice/correct"
    - "inpact    → delta-kernel : GET /api/cycleboard (+ daily-brief/state)"
    - "droplist  → delta-kernel : POST /api/signals/ingest (DROPLIST_ATLAS_SIGNALS_URL)"
    - "cortex    → delta-kernel"
    - "optogon   → delta-kernel"
    - "canvas-engine → delta-kernel"
    - "ws-gateway → delta-kernel"
    - "uasc-executor → delta-kernel"
    - "aegis-fabric → delta-kernel"
    - "cognitive-sensor → delta-kernel (ingest analyzed state)"
  other:
    - "optogon → cortex"
    - "inpact  → cortex : POST /inpact/run/{module}"
    - "droplist → search-stack (external retrieval, gated)"
    - "code-converter → canvas-engine"
    - "crucix   → canvas-engine"
    - "lattice  → cognitive-sensor"
    - "mosaic-orchestrator → optogon"
    - "mosaic-dashboard → mosaic-orchestrator (legacy chain)"
    - "perception → triangulation (stub chain)"
  cross_repo:
    - "delta-scp-web → delta-scp :3012"
    - "hydra → hydra-engine :8899 → delta-scp :3012"

# =============================================================================
# data_artifacts — the state stores (often gitignored; SHAPE not contents)
# =============================================================================
data_artifacts:
  - { system: delta-kernel, kind: sqlite (better-sqlite3), shape: "state · cycleboard · dayplans · journal · history · tasks · signals · timeline · work-ledger", note: "the single source of durable truth" }
  - { system: cognitive-sensor, kind: sqlite (sqlite3.connect via DB_PATH), shape: "ideas · loops · decisions · metrics" }
  - { system: cognitive-sensor, kind: json_corpus, shape: "conversations.json · memory_db.json(+bak) · idea_registry.json · ideas_{classified,deduplicated}.json · excavated_ideas_raw.json · timeline_events.json(2.2MB)", note: "large, gitignored — the corpus the pipeline mines" }
  - { system: droplist, kind: storage_layer, shape: "DAGs · packets · entities (storage.save_dag)" }
  - { system: atlas-map-api, kind: snapshot, shape: "reads audit/system-index.json + atlas-map.json (no own DB)" }
  - { system: contracts, kind: json_schema, shape: "50 draft-07 schemas — the typed wire format", path: contracts/schemas/ }
  - { system: audit, kind: map, shape: "system-index.json (counts/ports) + atlas-map.json (purposes/edges/governance)", note: "the machine-readable map this manifest reconciles" }

# =============================================================================
# lifecycle_flags — load-bearing tags an agent MUST respect
# =============================================================================
lifecycle_flags:
  hub: [delta-kernel]
  active: [delta-kernel, aegis-fabric, atlas-map-api, canvas-engine, droplist, memory-hub, search-stack, uasc-executor, crucix, inpact, lattice, code-converter, hydra, delta-scp]
  gated_default_off: [cortex, optogon]            # need explicit env flags to act
  dormant: [cognitive-sensor (triage unscheduled), ws-gateway (not autostarted)]
  stub_do_not_build_on: [perception, triangulation]
  retired_do_not_build_on: [mirofish, openclaw, mosaic-dashboard, mosaic-orchestrator, blueprint-generator, ai-exec-pipeline]
  security_flags: ["code-converter: RCE risk", "crucix/hydra/webos: XSS (per SHIP_READINESS audit)"]

# =============================================================================
# verification — provenance + honest confidence
# =============================================================================
verification:
  legend:
    provides_verified: "route list extracted first-hand via rg from the named entry_point — high confidence."
    provides_not_enumerated: "service runs but its routes weren't captured by the decorator sweep (uvicorn app / MCP / legacy). Listed honestly as such — NOT fabricated."
  high_confidence: [delta-kernel, aegis-fabric, atlas-map-api, canvas-engine, cortex, droplist, memory-hub, crucix, mirofish, cognitive-sensor(triage), code-converter, ai-exec-pipeline]
  surface_only_inferred: [optogon, search-stack, uasc-executor, openclaw, mosaic-orchestrator, triangulation, ws-gateway]
  known_drift:
    - "ports: system-index.json code-defaults are stale in 4 places; runtime_ports above (from launch.json) is authoritative."
    - "lifecycle: 6 systems tagged retired but still present (some still in autostart) — see lifecycle_flags."
  rebuild: "regenerate by re-running: rg route sweep + read .claude/launch.json + atlas-map.json + audit/system-index.json. See header PROVENANCE."
