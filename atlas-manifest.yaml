  - 'droplist → delta-kernel : POST /api/signals/ingest (DROPLIST_ATLAS_SIGNALS_URL)'
  - cortex → delta-kernel
  - optogon → delta-kernel
  - canvas-engine → delta-kernel
  - ws-gateway → delta-kernel
  - uasc-executor → delta-kernel
  - aegis-fabric → delta-kernel
  - 'cognitive-sensor → delta-kernel : ingest analyzed state'
  other:
  - optogon → cortex
  - mosaic-orchestrator → optogon
  - 'mosaic-dashboard → mosaic-orchestrator : legacy chain'
  - code-converter → canvas-engine
  - 'perception → triangulation : stub chain'
  - 'inpact → cortex : POST /inpact/run/{module}'
  - 'droplist → search-stack : external retrieval, gated'
  - crucix → canvas-engine
