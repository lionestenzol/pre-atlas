<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake.io HTML</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      background: radial-gradient(circle at center, #111 0%, #050505 100%);
      font-family: Arial, sans-serif;
      color: white;
      touch-action: none;
    }

    canvas {
      display: block;
      background: #080808;
    }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 16px;
      border-radius: 14px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
    }

    #score {
      font-size: 20px;
      font-weight: bold;
    }

    #hint {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 4px;
    }

    #gameOver {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.75);
      z-index: 20;
      text-align: center;
    }

    #gameOver h1 {
      font-size: 48px;
      margin-bottom: 12px;
    }

    #gameOver button {
      margin-top: 18px;
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: black;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="hint">Move: mouse / touch / WASD / arrows</div>
  </div>

  <div id="gameOver">
    <h1>Game Over</h1>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Restart</button>
  </div>

  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const gameOverEl = document.getElementById("gameOver");
    const finalScoreEl = document.getElementById("finalScore");

    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    const WORLD_SIZE = 3000;
    const FOOD_COUNT = 450;
    const BOT_COUNT = 8;

    const camera = {
      x: 0,
      y: 0
    };

    const mouse = {
      x: W / 2,
      y: H / 2
    };

    let keys = {};
    let foods = [];
    let bots = [];
    let gameRunning = true;

    class Snake {
      constructor(x, y, color, isPlayer = false) {
        this.x = x;
        this.y = y;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = isPlayer ? 3.1 : 2.3;
        this.radius = isPlayer ? 12 : 10;
        this.color = color;
        this.isPlayer = isPlayer;
        this.length = isPlayer ? 90 : 70;
        this.score = 0;
        this.body = [];

        for (let i = 0; i < this.length; i++) {
          this.body.push({ x: this.x, y: this.y });
        }

        this.targetAngle = this.angle;
        this.turnSpeed = isPlayer ? 0.14 : 0.055;
      }

      update() {
        if (this.isPlayer) {
          this.controlPlayer();
        } else {
          this.controlBot();
        }

        let diff = this.targetAngle - this.angle;

        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;

        this.angle += diff * this.turnSpeed;

        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        this.x = Math.max(-WORLD_SIZE / 2, Math.min(WORLD_SIZE / 2, this.x));
        this.y = Math.max(-WORLD_SIZE / 2, Math.min(WORLD_SIZE / 2, this.y));

        this.body.unshift({ x: this.x, y: this.y });

        while (this.body.length > this.length) {
          this.body.pop();
        }

        this.eatFood();
      }

      controlPlayer() {
        let dx = mouse.x - W / 2;
        let dy = mouse.y - H / 2;

        if (keys["ArrowUp"] || keys["w"]) dy -= 80;
        if (keys["ArrowDown"] || keys["s"]) dy += 80;
        if (keys["ArrowLeft"] || keys["a"]) dx -= 80;
        if (keys["ArrowRight"] || keys["d"]) dx += 80;

        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
          this.targetAngle = Math.atan2(dy, dx);
        }
      }

      controlBot() {
        let nearest = null;
        let nearestDist = Infinity;

        for (const food of foods) {
          const dx = food.x - this.x;
          const dy = food.y - this.y;
          const dist = dx * dx + dy * dy;

          if (dist < nearestDist) {
            nearestDist = dist;
            nearest = food;
          }
        }

        if (nearest) {
          this.targetAngle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
        }

        if (Math.abs(this.x) > WORLD_SIZE / 2 - 300 || Math.abs(this.y) > WORLD_SIZE / 2 - 300) {
          this.targetAngle = Math.atan2(-this.y, -this.x);
        }
      }

      eatFood() {
        for (let i = foods.length - 1; i >= 0; i--) {
          const food = foods[i];
          const dx = food.x - this.x;
          const dy = food.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < this.radius + food.radius) {
            foods.splice(i, 1);
            this.length += 5;
            this.score += food.value;
            spawnFood(1);

            if (this.isPlayer) {
              scoreEl.textContent = "Score: " + this.score;
            }
          }
        }
      }

      draw() {
        for (let i = this.body.length - 1; i >= 0; i--) {
          const p = this.body[i];
          const t = i / this.body.length;
          const r = this.radius * (1 - t * 0.45);

          ctx.beginPath();
          ctx.arc(
            p.x - camera.x + W / 2,
            p.y - camera.y + H / 2,
            r,
            0,
            Math.PI * 2
          );
          ctx.fillStyle = this.color;
          ctx.fill();
        }

        this.drawEyes();
      }

      drawEyes() {
        const headX = this.x - camera.x + W / 2;
        const headY = this.y - camera.y + H / 2;

        const eyeOffsetX = Math.cos(this.angle + Math.PI / 2) * 5;
        const eyeOffsetY = Math.sin(this.angle + Math.PI / 2) * 5;
        const forwardX = Math.cos(this.angle) * 7;
        const forwardY = Math.sin(this.angle) * 7;

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(headX + eyeOffsetX + forwardX, headY + eyeOffsetY + forwardY, 4, 0, Math.PI * 2);
        ctx.arc(headX - eyeOffsetX + forwardX, headY - eyeOffsetY + forwardY, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(headX + eyeOffsetX + forwardX * 1.15, headY + eyeOffsetY + forwardY * 1.15, 2, 0, Math.PI * 2);
        ctx.arc(headX - eyeOffsetX + forwardX * 1.15, headY - eyeOffsetY + forwardY * 1.15, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class Food {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = Math.random() * 3 + 3;
        this.value = Math.floor(this.radius * 2);
        this.color = `hsl(${Math.random() * 360}, 90%, 60%)`;
      }

      draw() {
        const sx = this.x - camera.x + W / 2;
        const sy = this.y - camera.y + H / 2;

        if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) return;

        ctx.beginPath();
        ctx.arc(sx, sy, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    let player;

    function spawnFood(amount) {
      for (let i = 0; i < amount; i++) {
        foods.push(new Food(
          Math.random() * WORLD_SIZE - WORLD_SIZE / 2,
          Math.random() * WORLD_SIZE - WORLD_SIZE / 2
        ));
      }
    }

    function spawnBots() {
      bots = [];

      const colors = [
        "#ff3b3b",
        "#3bff7a",
        "#3ba7ff",
        "#ffde3b",
        "#ff3bda",
        "#9d3bff",
        "#ff8c3b",
        "#3bfff5"
      ];

      for (let i = 0; i < BOT_COUNT; i++) {
        bots.push(new Snake(
          Math.random() * WORLD_SIZE - WORLD_SIZE / 2,
          Math.random() * WORLD_SIZE - WORLD_SIZE / 2,
          colors[i % colors.length],
          false
        ));
      }
    }

    function checkCollisions() {
      const enemies = [...bots];

      for (const snake of enemies) {
        for (let i = 15; i < snake.body.length; i++) {
          const p = snake.body[i];
          const dx = player.x - p.x;
          const dy = player.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < player.radius + snake.radius * 0.65) {
            endGame();
            return;
          }
        }
      }

      for (let i = 20; i < player.body.length; i++) {
        const p = player.body[i];
        const dx = player.x - p.x;
        const dy = player.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < player.radius * 0.8) {
          endGame();
          return;
        }
      }
    }

    function endGame() {
      gameRunning = false;
      finalScoreEl.textContent = "Final Score: " + player.score;
      gameOverEl.style.display = "flex";
    }

    function restartGame() {
      foods = [];
      spawnFood(FOOD_COUNT);
      spawnBots();

      player = new Snake(0, 0, "#ffffff", true);
      scoreEl.textContent = "Score: 0";
      gameOverEl.style.display = "none";
      gameRunning = true;
    }

    function drawGrid() {
      const gridSize = 100;
      const startX = Math.floor((camera.x - W / 2) / gridSize) * gridSize;
      const startY = Math.floor((camera.y - H / 2) / gridSize) * gridSize;

      ctx.strokeStyle = "rgba(255,255,255,0.04)";
      ctx.lineWidth = 1;

      for (let x = startX; x < camera.x + W / 2 + gridSize; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x - camera.x + W / 2, 0);
        ctx.lineTo(x - camera.x + W / 2, H);
        ctx.stroke();
      }

      for (let y = startY; y < camera.y + H / 2 + gridSize; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y - camera.y + H / 2);
        ctx.lineTo(W, y - camera.y + H / 2);
        ctx.stroke();
      }
    }

    function drawBorder() {
      const x = -WORLD_SIZE / 2 - camera.x + W / 2;
      const y = -WORLD_SIZE / 2 - camera.y + H / 2;

      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 6;
      ctx.strokeRect(x, y, WORLD_SIZE, WORLD_SIZE);
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);

      if (gameRunning) {
        player.update();

        for (const bot of bots) {
          bot.update();
        }

        checkCollisions();
      }

      camera.x += (player.x - camera.x) * 0.12;
      camera.y += (player.y - camera.y) * 0.12;

      drawGrid();
      drawBorder();

      for (const food of foods) {
        food.draw();
      }

      for (const bot of bots) {
        bot.draw();
      }

      player.draw();

      requestAnimationFrame(loop);
    }

    window.addEventListener("mousemove", e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("touchmove", e => {
      if (e.touches.length > 0) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }
    }, { passive: false });

    window.addEventListener("keydown", e => {
      keys[e.key] = true;
    });

    window.addEventListener("keyup", e => {
      keys[e.key] = false;
    });

    restartGame();
    loop();
  </script>
</body>
</html>
