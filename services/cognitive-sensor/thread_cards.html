<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread Cards · Triage</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1f1f1f;
    --border-bright: #2e2e2e;
    --text: #e8e8e8;
    --dim: #666;
    --mid: #999;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.08);
    --red: #ff4444;
    --amber: #ffaa00;
    --blue: #4488ff;
    --green: #44ff88;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 20px; min-height: 100vh; }

  header { display: flex; align-items: baseline; justify-content: space-between; padding-bottom: 14px; border-bottom: 1px solid var(--border-bright); margin-bottom: 18px; }
  .brand { font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; font-weight: 600; }
  .counts { font-size: 11px; color: var(--mid); }
  .counts span + span { margin-left: 18px; }

  .loader { padding: 14px 0; display: flex; align-items: center; gap: 10px; }
  .loader input { background: var(--surface); border: 1px solid var(--border-bright); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 6px 10px; width: 360px; outline: none; }
  .loader input:focus { border-color: var(--accent); }
  .loader button { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 11px; padding: 6px 14px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  .loader button:hover { background: rgba(200,255,0,0.18); }

  .cards { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 1100px; }

  .card { background: var(--surface); border: 1px solid var(--border); padding: 16px 18px; transition: border-color 0.15s; }
  .card.verdict-KEEP     { border-left: 3px solid var(--green); }
  .card.verdict-CLOSE    { border-left: 3px solid var(--dim); }
  .card.verdict-MINE     { border-left: 3px solid var(--amber); }
  .card.verdict-ARCHIVE  { border-left: 3px solid var(--red); }
  .card.verdict-REVIEW   { border-left: 3px solid var(--blue); }
  .card.source-fs        { border-top: 1px dashed var(--border-bright); }
  .card.source-fest      { border-top: 1px dashed rgba(68,255,136,0.25); }
  .card.verdict-DONE     { border-left: 3px solid var(--green); }
  .card.verdict-SKIP     { border-left: 3px solid var(--dim); }

  .src-badge { font-size: 9px; letter-spacing: 0.1em; padding: 1px 6px; border: 1px solid var(--border-bright); color: var(--mid); margin-right: 8px; text-transform: uppercase; }
  .src-badge.fs   { color: var(--blue); border-color: rgba(68,136,255,0.3); }
  .src-badge.convo { color: var(--accent); border-color: rgba(200,255,0,0.3); }
  .src-badge.fest { color: var(--green); border-color: rgba(68,255,136,0.3); }
  .fest-path { font-size: 10px; color: var(--dim); letter-spacing: 0.04em; }
  .fest-fid { color: var(--green); opacity: 0.8; }
  .sev-high   { color: var(--red); }
  .sev-medium { color: var(--amber); }
  .sev-low    { color: var(--mid); }
  .evidence   { font-family: var(--mono); font-size: 10px; color: var(--dim); word-break: break-all; margin: 6px 0; padding: 4px 8px; background: rgba(255,255,255,0.02); border-left: 2px solid var(--border-bright); }
  .proposal   { font-family: var(--sans); font-size: 11px; color: var(--mid); margin: 8px 0; padding: 8px 10px; background: rgba(200,255,0,0.04); border-left: 2px solid var(--accent); }
  .proposal .label { color: var(--accent); font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; margin-right: 8px; }
  .proposal .verdict-chip { color: var(--accent); font-weight: 600; font-family: var(--mono); }
  .proposal .conf { color: var(--dim); font-size: 10px; margin-left: 8px; }
  .proposal .rationale { display: block; color: var(--text); margin-top: 4px; font-size: 11px; }

  .card-top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .card-title { font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--text); }
  .card-title .cid { color: var(--dim); margin-right: 6px; font-family: var(--mono); }
  .card-date { font-size: 10px; color: var(--dim); letter-spacing: 0.05em; }

  .stat-row { display: flex; gap: 18px; font-size: 11px; color: var(--mid); margin-bottom: 6px; flex-wrap: wrap; }
  .stat-row .k { color: var(--dim); }
  .stat-row .v { color: var(--text); }
  .stat-row .accent { color: var(--accent); }
  .stat-row .red { color: var(--red); }
  .stat-row .amber { color: var(--amber); }
  .stat-row .green { color: var(--green); }

  .sparkline { font-family: var(--mono); letter-spacing: 2px; color: var(--accent); }

  .excerpt { font-family: var(--sans); font-size: 11px; color: var(--mid); line-height: 1.5; border-left: 2px solid var(--border-bright); padding: 3px 10px; margin: 6px 0; }
  .excerpt .label { color: var(--dim); font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; margin-right: 6px; }

  .topics { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0 10px 0; }
  .topic { font-size: 9px; color: var(--mid); border: 1px solid var(--border-bright); padding: 1px 7px; border-radius: 2px; }
  .topic.hot { color: var(--accent); border-color: rgba(200,255,0,0.3); }

  .actions { display: flex; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .vbtn { background: none; border: 1px solid var(--border-bright); color: var(--mid); font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 14px; cursor: pointer; transition: all 0.12s; }
  .vbtn:hover { border-color: var(--accent); color: var(--accent); }
  .vbtn.chosen { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .note { flex: 1; background: none; border: 1px solid var(--border); color: var(--mid); font-family: var(--mono); font-size: 10px; padding: 5px 10px; outline: none; }
  .note:focus { border-color: var(--accent); color: var(--text); }

  .shortcut { position: fixed; bottom: 16px; right: 20px; font-size: 10px; color: var(--dim); background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; line-height: 1.8; }
  .shortcut b { color: var(--accent); }

  .empty { padding: 60px 20px; text-align: center; color: var(--dim); font-size: 12px; }
  .empty input[type="file"] { display: none; }
  .empty label { color: var(--accent); text-decoration: underline; cursor: pointer; }

  .export { background: none; border: 1px solid var(--border-bright); color: var(--mid); font-family: var(--mono); font-size: 10px; padding: 4px 10px; letter-spacing: 0.08em; cursor: pointer; }
  .export:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="brand">Thread Cards · Triage</div>
  <div class="view-toggle" style="display:flex; gap:0; border:1px solid var(--border-bright);">
    <button class="vbtn view-tab active" data-view="threads" onclick="switchView('threads')">Threads</button>
    <button class="vbtn view-tab" data-view="ideas" onclick="switchView('ideas')">Ideas</button>
  </div>
  <div class="counts">
    <span id="totalCount">0 cards</span>
    <span id="decidedCount">0 decided</span>
    <span id="syncBadge" style="color: var(--dim);">○ checking</span>
    <button class="export" onclick="exportDecisions()">Export decisions.json</button>
  </div>
</header>

<style>
  .view-tab { background: none; color: var(--dim); padding: 5px 14px; }
  .view-tab.active { background: var(--accent-dim); color: var(--accent); }
  .idea-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 16px 18px; margin-bottom: 14px; }
  .idea-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .idea-title { font-family: var(--sans); font-size: 15px; font-weight: 500; color: var(--text); }
  .idea-title .cid { color: var(--dim); font-family: var(--mono); margin-right: 8px; font-size: 11px; }
  .idea-meta { font-size: 10px; color: var(--dim); letter-spacing: 0.05em; }
  .idea-meta .tier { padding: 1px 7px; border-radius: 2px; margin-right: 8px; }
  .tier-execute_now { background: rgba(200,255,0,0.15); color: var(--accent); }
  .tier-next_up     { background: rgba(255,170,0,0.15); color: var(--amber); }
  .tier-backlog     { background: rgba(255,255,255,0.04); color: var(--mid); }
  .tier-archive     { background: rgba(255,68,68,0.1); color: var(--red); }
  .repo-badge { display: inline-block; background: rgba(68,255,136,0.1); color: var(--green); border: 1px solid rgba(68,255,136,0.2); padding: 1px 7px; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; margin-left: 8px; }
  .timeline { margin-top: 10px; border-left: 2px solid var(--border-bright); padding-left: 12px; }
  .tl-row { display: flex; align-items: center; gap: 10px; font-size: 10px; padding: 3px 0; color: var(--mid); font-family: var(--mono); }
  .tl-date { color: var(--dim); width: 80px; flex-shrink: 0; }
  .tl-cid { color: var(--dim); width: 50px; flex-shrink: 0; }
  .tl-title { color: var(--text); flex: 1; font-family: var(--sans); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tl-bar { height: 6px; min-width: 2px; background: var(--accent); opacity: 0.55; border-radius: 1px; }
  .tl-stats { color: var(--dim); font-size: 9px; width: 110px; text-align: right; }
  .tl-verdict { font-size: 8px; letter-spacing: 0.1em; padding: 1px 5px; width: 58px; text-align: center; }
  .verdict-KEEP    { background: rgba(68,255,136,0.15); color: var(--green); }
  .verdict-CLOSE   { background: rgba(255,255,255,0.06); color: var(--dim); }
  .verdict-MINE    { background: rgba(255,170,0,0.15); color: var(--amber); }
  .verdict-ARCHIVE { background: rgba(255,68,68,0.12); color: var(--red); }
  .verdict-REVIEW  { background: rgba(68,136,255,0.15); color: var(--blue); }
  .idea-stats { display: flex; gap: 20px; font-size: 11px; color: var(--mid); flex-wrap: wrap; margin: 8px 0; }
  .idea-stats .big { color: var(--accent); font-size: 14px; font-weight: 500; }
  .idea-related { margin-top: 10px; font-size: 10px; color: var(--dim); }
  .idea-related code { color: var(--mid); margin-right: 6px; }
</style>

<div class="loader">
  <input type="text" id="pathInput" placeholder="thread_cards.json (drop here, paste path, or use buttons)" value="thread_cards.json">
  <button onclick="loadFromPath()">Load</button>
  <label for="fileInput" class="vbtn" style="padding: 6px 14px; cursor: pointer;">Or pick file</label>
  <input type="file" id="fileInput" accept=".json" style="display:none;">
</div>

<div id="cards" class="cards"></div>

<div id="empty" class="empty" style="display:none;">
  No cards loaded. Run:<br><br>
  <code style="color: var(--accent);">python thread_scorer.py --cluster 121 --json thread_cards.json --quiet</code><br><br>
  then click Load.
</div>

<div class="shortcut">
  <b>k</b> keep · <b>c</b> close · <b>m</b> mine · <b>a</b> archive · <b>r</b> review<br>
  <b>j</b>/<b>↓</b> next · <b>k</b>/<b>↑</b> prev · <b>u</b> undo · <b>e</b> export
</div>

<script>
let cards = [];
let ideas = [];
let decisions = {};
let activeIdx = 0;
let undoStack = [];
let currentView = 'threads';

function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  if (v === 'ideas' && ideas.length === 0) {
    fetch('/idea_code_join.json?'+Date.now())
      .then(r => r.json())
      .then(d => { ideas = d.cards || []; renderIdeas(); })
      .catch(() => {
        document.getElementById('cards').innerHTML =
          '<div class="empty">Run: <code style="color:var(--accent)">python idea_code_join.py --top 50 --json idea_code_join.json</code></div>';
      });
  } else if (v === 'ideas') {
    renderIdeas();
  } else {
    render();
  }
}

function renderIdeas() {
  const root = document.getElementById('cards');
  root.innerHTML = '';
  document.getElementById('totalCount').textContent = `${ideas.length} ideas`;
  document.getElementById('decidedCount').textContent = `${ideas.filter(i => i.repo_exists).length} in repo`;
  if (ideas.length === 0) { root.innerHTML = '<div class="empty">No idea cards loaded.</div>'; return; }

  ideas.forEach(idea => root.appendChild(renderIdeaCard(idea)));
}

function renderIdeaCard(i) {
  const el = document.createElement('div');
  el.className = 'idea-card';

  const tierKey = i.tier || 'backlog';
  const tl = i.timeline || [];
  const maxBlocks = Math.max(1, ...tl.map(t => t.blocks || 0));

  el.innerHTML = `
    <div class="idea-head">
      <div class="idea-title"><span class="cid">${i.canonical_id}</span>${escapeHtml(i.canonical_title || '?')}</div>
      <div class="idea-meta">
        <span class="tier tier-${tierKey}">${tierKey}</span>
        priority ${i.priority_score?.toFixed?.(3) || '?'} · ${i.category || '?'} · ${i.complexity || '?'}
        ${i.repo_exists ? `<span class="repo-badge">in repo ✓</span>` : ''}
      </div>
    </div>
    <div class="idea-stats">
      <span><span class="big">${i.unique_blocks}</span> <span style="color:var(--dim);">unique blocks</span></span>
      <span>total <span style="color:var(--text);">${i.total_blocks}</span></span>
      <span>in repo <span style="color:var(--text);">${i.in_repo}</span></span>
      <span>convos <span style="color:var(--text);">${i.convo_count}</span></span>
      <span>res <span style="color:var(--green);">${i.resolution_hits}</span></span>
      <span>frust <span style="color:var(--red);">${i.frustration_hits}</span></span>
      <span style="color:var(--dim);">${i.date_first || '?'} → ${i.date_last || '?'}</span>
    </div>
    <div class="idea-stats" style="font-size:10px;">
      <span>langs: ${Object.entries(i.languages || {}).slice(0,5).map(([k,v]) => `${escapeHtml(k)}(${v})`).join(' · ') || '-'}</span>
    </div>
    <div class="timeline">
      ${tl.map(row => {
        const barWidth = Math.max(2, Math.round((row.blocks / maxBlocks) * 180));
        const verdict = row.verdict ? `<span class="tl-verdict verdict-${row.verdict}">${row.verdict}</span>` : `<span class="tl-verdict" style="color:transparent;">·</span>`;
        return `<div class="tl-row">
          <span class="tl-date">${row.date || '?'}</span>
          <span class="tl-cid">#${row.convo_id}</span>
          <span class="tl-title">${escapeHtml(row.title || '?')}</span>
          <span class="tl-bar" style="width:${barWidth}px;"></span>
          <span class="tl-stats">${row.blocks}b · ${row.resolution}r · ${row.frustration}f</span>
          ${verdict}
        </div>`;
      }).join('')}
    </div>
    ${(i.related_ideas && i.related_ideas.length) ? `
    <div class="idea-related">related: ${i.related_ideas.slice(0,8).map(r => `<code>${r}</code>`).join('')}</div>
    ` : ''}
  `;
  return el;
}

function $(id) { return document.getElementById(id); }

async function loadFromPath() {
  const path = $('pathInput').value.trim();
  if (!path) return;
  try {
    const r = await fetch(path);
    const data = await r.json();
    ingest(data);
  } catch(e) {
    alert('Fetch failed (browser fetch restricted on file://). Use the file picker instead.');
  }
}

$('fileInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try { ingest(JSON.parse(evt.target.result)); }
    catch { alert('Invalid JSON'); }
  };
  reader.readAsText(f);
});

function ingest(data) {
  cards = data.cards || data;
  if (!Array.isArray(cards)) { alert('Expected cards array'); return; }
  decisions = {};
  activeIdx = 0;
  undoStack = [];
  render();
}

function render() {
  const root = $('cards');
  root.innerHTML = '';
  if (cards.length === 0) { $('empty').style.display = 'block'; return; }
  $('empty').style.display = 'none';
  cards.forEach((c, i) => root.appendChild(renderCard(c, i)));
  updateCounts();
}

function sparkline(density) {
  const chars = ' ▁▂▃▄▅▆▇█';
  const mx = Math.max(...density, 1);
  return density.map(v => chars[Math.min(8, Math.floor((v * 8) / mx))]).join('');
}

function renderCard(c, i) {
  if (c.source === 'fs') return renderFsCard(c, i);
  if (c.source === 'fest') return renderFestCard(c, i);
  const el = document.createElement('div');
  el.className = 'card source-convo' + (decisions[c.convo_id] ? ' verdict-' + decisions[c.convo_id].verdict : '');
  el.id = 'card-' + i;
  if (i === activeIdx) el.style.boxShadow = '0 0 0 1px rgba(200,255,0,0.25)';

  const size = c.size, cb = c.code_blocks, kw = c.kwic, ex = c.excerpts, cl = c.classification, ct = c.cluster;
  const spark = sparkline(c.density);

  const kwicClass = (n, type) => {
    if (type === 'frustration' && n > 10) return 'red';
    if (type === 'resolution' && n > 5) return 'green';
    if (type === 'hedge' && n > 50) return 'amber';
    return '';
  };

  el.innerHTML = `
    <div class="card-top">
      <div class="card-title"><span class="src-badge convo">CV</span><span class="cid">#${c.convo_id}</span>${escapeHtml(c.title || '?')}</div>
      <div class="card-date">${c.date || '?'} · cluster ${ct.cluster_id} (${ct.sibling_count} siblings)</div>
    </div>
    <div class="stat-row">
      <span><span class="k">size</span> <span class="v">${size.total}</span> <span class="k">(u</span> ${size.user} <span class="k">/ a</span> ${size.assistant}<span class="k">)</span></span>
      <span><span class="k">density</span> <span class="sparkline">${spark}</span></span>
      <span><span class="k">chars</span> <span class="v">${(size.total_chars/1000).toFixed(1)}k</span></span>
    </div>
    <div class="stat-row">
      <span><span class="k">code</span> <span class="accent">${cb.count}</span> <span class="k">blocks</span></span>
      <span><span class="k">langs</span> <span class="v">${Object.keys(cb.languages).slice(0,4).join(', ') || '-'}</span></span>
      <span><span class="k">longest</span> <span class="v">${cb.longest_lines}L</span></span>
      ${c.repo_scan ? `<span><span class="k">in repo</span> <span class="${c.repo_scan.blocks_total && c.repo_scan.blocks_unique/c.repo_scan.blocks_total > 0.5 ? 'amber' : 'green'}">${c.repo_scan.blocks_overlapping}/${c.repo_scan.blocks_total}</span> <span class="k">unique</span> <span class="amber">${c.repo_scan.blocks_unique}</span></span>` : ''}
    </div>
    ${c.repo_scan && c.repo_scan.unique_samples && c.repo_scan.unique_samples.length ? `
    <div class="excerpt"><span class="label">unmined</span>${c.repo_scan.unique_samples.slice(0,3).map(s => `<code style="color:var(--amber)">${escapeHtml(s[0])}</code>: ${escapeHtml(s[1])}`).join(' · ')}</div>
    ` : ''}
    <div class="stat-row">
      <span><span class="k">hedge</span> <span class="${kwicClass(kw.hedge_hits,'hedge')}">${kw.hedge_hits}</span></span>
      <span><span class="k">resolution</span> <span class="${kwicClass(kw.resolution_hits,'resolution')}">${kw.resolution_hits}</span></span>
      <span><span class="k">frustration</span> <span class="${kwicClass(kw.frustration_hits,'frustration')}">${kw.frustration_hits}</span></span>
      <span><span class="k">class</span> <span class="v">${cl.domain}/${cl.outcome}</span></span>
    </div>
    <div class="topics">
      ${(c.topics||[]).map((t,j) => `<span class="topic${j<2?' hot':''}">${escapeHtml(t.topic)} ${t.weight}</span>`).join('')}
    </div>
    <div class="excerpt"><span class="label">first</span>${escapeHtml((ex.first_user||'').slice(0,200))}</div>
    <div class="excerpt"><span class="label">last user</span>${escapeHtml((ex.last_user||'').slice(0,200))}</div>
    <div class="excerpt"><span class="label">last asst</span>${escapeHtml((ex.last_assistant||'').slice(0,200))}</div>
    <div class="actions">
      ${['KEEP','CLOSE','MINE','ARCHIVE','REVIEW'].map(v =>
        `<button class="vbtn ${decisions[c.convo_id]?.verdict===v?'chosen':''}" onclick="setVerdict('${c.convo_id}','${v}')">${v}</button>`
      ).join('')}
      <input class="note" placeholder="note (optional)" value="${escapeHtml(decisions[c.convo_id]?.note||'')}" onchange="setNote('${c.convo_id}', this.value)">
    </div>
  `;
  return el;
}

function renderFsCard(c, i) {
  const el = document.createElement('div');
  el.className = 'card source-fs' + (decisions[c.convo_id] ? ' verdict-' + decisions[c.convo_id].verdict : '');
  el.id = 'card-' + i;
  if (i === activeIdx) el.style.boxShadow = '0 0 0 1px rgba(200,255,0,0.25)';
  const sev = c.severity || 'medium';
  const verdicts = ['KEEP', 'CLOSE', 'ARCHIVE', 'REVIEW', 'DROP'];
  const prop = c.optogon_proposal;
  const propBlock = prop && prop.verdict ? `
    <div class="proposal">
      <span class="label">Optogon</span>
      <span class="verdict-chip">${escapeHtml(prop.verdict)}</span>
      <span class="conf">(${prop.action || 'no action'} · conf ${Number(prop.confidence||0).toFixed(2)})</span>
      <span class="rationale">${escapeHtml(prop.rationale || '')}</span>
      <button class="vbtn" style="margin-top: 6px;" onclick="acceptProposal('${c.convo_id}','${escapeHtml(prop.verdict)}','${escapeHtml(prop.rationale || '').replace(/'/g, "&#39;")}')">ACCEPT PROPOSAL</button>
    </div>
  ` : '';
  el.innerHTML = `
    <div class="card-top">
      <div class="card-title">
        <span class="src-badge fs">FS</span>
        <span class="sev-${sev}">${sev.toUpperCase()}</span>
        &nbsp;${escapeHtml(c.title || '?')}
      </div>
      <div class="card-date">${c.age_label || c.date || '?'}</div>
    </div>
    <div class="evidence">${escapeHtml(c.evidence || '')}</div>
    ${propBlock}
    <div class="actions">
      ${verdicts.map(v =>
        `<button class="vbtn ${decisions[c.convo_id]?.verdict===v?'chosen':''}" onclick="setVerdict('${c.convo_id}','${v}')">${v}</button>`
      ).join('')}
      <input class="note" placeholder="note (optional)" value="${escapeHtml(decisions[c.convo_id]?.note||'')}" onchange="setNote('${c.convo_id}', this.value)">
    </div>
  `;
  return el;
}

function renderFestCard(c, i) {
  const el = document.createElement('div');
  el.className = 'card source-fest' + (decisions[c.convo_id] ? ' verdict-' + decisions[c.convo_id].verdict : '');
  el.id = 'card-' + i;
  if (i === activeIdx) el.style.boxShadow = '0 0 0 1px rgba(200,255,0,0.25)';
  const verdicts = ['DONE', 'SKIP', 'REVIEW'];
  const pathLabel = `${c.phase || ''} / ${c.sequence || ''} / ${c.task_num || ''}`;
  el.innerHTML = `
    <div class="card-top">
      <div class="card-title">
        <span class="src-badge fest">FEST</span>
        <span class="fest-fid">${escapeHtml(c.festival_id || '')}</span>
        &nbsp;${escapeHtml(c.title || '?')}
      </div>
      <div class="card-date">${escapeHtml(c.lifecycle || '')} \u00b7 ${escapeHtml(c.festival_name || '')}</div>
    </div>
    <div class="fest-path">${escapeHtml(pathLabel)}</div>
    <div class="evidence">${escapeHtml(c.evidence || '')}</div>
    <div class="actions">
      ${verdicts.map(v =>
        `<button class="vbtn ${decisions[c.convo_id]?.verdict===v?'chosen':''}" onclick="setVerdict('${c.convo_id}','${v}')">${v}</button>`
      ).join('')}
      <input class="note" placeholder="note (optional)" value="${escapeHtml(decisions[c.convo_id]?.note||'')}" onchange="setNote('${c.convo_id}', this.value)">
    </div>
  `;
  return el;
}

function acceptProposal(cid, verdict, rationale) {
  setVerdict(cid, verdict);
  if (rationale && !decisions[cid]?.note) {
    decisions[cid].note = `accepted: ${rationale.replace(/&#39;/g, "'")}`;
    postDecision(cid);
  }
}

function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function setVerdict(cid, v) {
  undoStack.push(JSON.parse(JSON.stringify(decisions)));
  decisions[cid] = { verdict: v, note: decisions[cid]?.note || '', at: new Date().toISOString() };
  render();
  postDecision(cid);
  // auto-advance
  const i = cards.findIndex(c => c.convo_id === cid);
  if (i >= 0 && i < cards.length - 1) { activeIdx = i + 1; scrollTo(activeIdx); }
}

let liveSync = true;
function postDecision(cid) {
  if (!liveSync) return;
  const card = cards.find(c => c.convo_id === cid);
  const dec = decisions[cid] || {};
  fetch('/api/decide', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      convo_id: cid,
      verdict: dec.verdict || '',
      note: dec.note || '',
      title: card ? (card.title || '') : ''
    })
  }).then(r => {
    if (!r.ok) throw new Error('bad status ' + r.status);
    updateSyncBadge('synced');
  }).catch(err => {
    // Fall back to offline mode silently — Download button still works.
    liveSync = false;
    updateSyncBadge('offline');
  });
}

function updateSyncBadge(state) {
  const el = document.getElementById('syncBadge');
  if (!el) return;
  if (state === 'synced') { el.textContent = '● live'; el.style.color = 'var(--green)'; }
  else if (state === 'offline') { el.textContent = '○ offline (use Download)'; el.style.color = 'var(--dim)'; }
}

function setNote(cid, note) {
  if (!decisions[cid]) decisions[cid] = { verdict: null, note: '', at: new Date().toISOString() };
  decisions[cid].note = note;
  postDecision(cid);
}

(function pingLiveSync() {
  fetch('/api/decide', { method: 'OPTIONS' })
    .then(r => updateSyncBadge(r.ok ? 'synced' : 'offline'))
    .catch(() => { liveSync = false; updateSyncBadge('offline'); });
})();

function updateCounts() {
  $('totalCount').textContent = `${cards.length} cards`;
  $('decidedCount').textContent = `${Object.values(decisions).filter(d=>d.verdict).length} decided`;
}

function scrollTo(i) { const el = $('card-' + i); if (el) el.scrollIntoView({behavior:'smooth', block:'center'}); }

function undo() {
  if (undoStack.length === 0) return;
  decisions = undoStack.pop();
  render();
}

function exportDecisions() {
  const out = {
    generated_at: new Date().toISOString(),
    total_cards: cards.length,
    decisions: Object.entries(decisions).filter(([_,d])=>d.verdict).map(([cid, d]) => ({
      convo_id: cid,
      verdict: d.verdict,
      note: d.note,
      decided_at: d.at,
      title: cards.find(c => c.convo_id === cid)?.title,
    })),
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'thread_decisions.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const map = {k:'KEEP', c:'CLOSE', m:'MINE', a:'ARCHIVE', r:'REVIEW'};
  if (map[e.key] && cards[activeIdx]) { setVerdict(cards[activeIdx].convo_id, map[e.key]); return; }
  if (e.key === 'j' || e.key === 'ArrowDown') { activeIdx = Math.min(cards.length-1, activeIdx+1); render(); scrollTo(activeIdx); }
  else if (e.key === 'ArrowUp') { activeIdx = Math.max(0, activeIdx-1); render(); scrollTo(activeIdx); }
  else if (e.key === 'u') { undo(); }
  else if (e.key === 'e') { exportDecisions(); }
});

// Auto-load on boot
loadFromPath().catch(() => { $('empty').style.display = 'block'; });
</script>
</body>
</html>
