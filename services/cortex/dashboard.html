<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cortex — Execution Layer</title>
<script src="https://cdn.tailwindcss.com/3.4.1"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { box-sizing: border-box; }
  body { background: #0b0f14; color: #c8d6e5; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0b0f14; }
  ::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 3px; }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-ok { background: #7dff9b; box-shadow: 0 0 6px #7dff9b44; }
  .dot-degraded { background: #ffb347; box-shadow: 0 0 6px #ffb34744; }
  .dot-down { background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b44; }

  .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-completed { background: #1a3a2a; color: #7dff9b; }
  .badge-failed, .badge-dead { background: #3a1a1a; color: #ff6b6b; }
  .badge-escalated { background: #2a1a3a; color: #c49bff; }
  .badge-rolled_back { background: #3a2a1a; color: #ffb347; }
  .badge-executing { background: #1a2a3a; color: #8cf2ff; animation: pulse 1.5s ease-in-out infinite; }
  .badge-planning { background: #2a2a1a; color: #ffe066; }
  .badge-blocked, .badge-awaiting_approval { background: #2a2020; color: #ff8888; }
  .badge-unplannable, .badge-budget_exceeded { background: #2a2a2a; color: #888; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .card { background: #111820; border: 1px solid #1e2d3d; border-radius: 8px; }
  .card-header { border-bottom: 1px solid #1e2d3d; }

  .metric-value { font-size: 28px; font-weight: 700; color: #fff; }
  .metric-label { font-size: 11px; color: #6b7b8d; text-transform: uppercase; letter-spacing: 1px; }

  .task-row { border-bottom: 1px solid #1a2530; cursor: pointer; transition: background 0.15s; }
  .task-row:hover { background: #151d28; }
  .task-row:last-child { border-bottom: none; }

  .step-line { position: relative; padding-left: 24px; }
  .step-line::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: #1e2d3d; }
  .step-dot { position: absolute; left: 3px; top: 4px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid; }
  .step-dot-success { border-color: #7dff9b; background: #1a3a2a; }
  .step-dot-failed { border-color: #ff6b6b; background: #3a1a1a; }
  .step-dot-skipped { border-color: #666; background: #222; }

  .timeline-event { border-left: 3px solid #1e2d3d; padding-left: 12px; margin-bottom: 8px; }
  .timeline-event.completed { border-left-color: #7dff9b; }
  .timeline-event.failed { border-left-color: #ff6b6b; }
  .timeline-event.escalated { border-left-color: #c49bff; }
</style>
</head>
<body class="min-h-screen p-4">

<!-- HEADER -->
<div class="flex items-center justify-between mb-6">
  <div class="flex items-center gap-3">
    <div class="text-xl font-bold text-white tracking-tight">
      <i class="fa-solid fa-brain text-cyan-400 mr-2"></i>CORTEX
    </div>
    <span class="text-xs text-gray-500">autonomous execution layer</span>
  </div>
  <div class="flex items-center gap-4 text-xs">
    <div id="uptime" class="text-gray-500"></div>
    <div class="flex items-center gap-2">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text" class="text-gray-400">connecting...</span>
    </div>
  </div>
</div>

<!-- UPSTREAM HEALTH -->
<div class="flex gap-2 mb-4 text-xs">
  <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-gray-900 border border-gray-800">
    <span class="status-dot" id="upstream-delta"></span>
    <span class="text-gray-400">delta :3001</span>
  </div>
  <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-gray-900 border border-gray-800">
    <span class="status-dot" id="upstream-aegis"></span>
    <span class="text-gray-400">aegis :3002</span>
  </div>
  <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-gray-900 border border-gray-800">
    <span class="status-dot" id="upstream-uasc"></span>
    <span class="text-gray-400">uasc :3008</span>
  </div>
</div>

<!-- METRICS -->
<div class="grid grid-cols-5 gap-3 mb-6">
  <div class="card p-4 text-center">
    <div class="metric-value" id="m-processed">-</div>
    <div class="metric-label">processed</div>
  </div>
  <div class="card p-4 text-center">
    <div class="metric-value text-green-400" id="m-completed">-</div>
    <div class="metric-label">completed</div>
  </div>
  <div class="card p-4 text-center">
    <div class="metric-value text-red-400" id="m-failed">-</div>
    <div class="metric-label">failed</div>
  </div>
  <div class="card p-4 text-center">
    <div class="metric-value text-cyan-400" id="m-cost">-</div>
    <div class="metric-label">cost (usd)</div>
  </div>
  <div class="card p-4 text-center">
    <div class="metric-value text-yellow-400" id="m-queue">-</div>
    <div class="metric-label">queued</div>
  </div>
</div>

<!-- COMMAND BAR -->
<div class="card mb-4 p-3">
  <div class="flex items-center gap-2">
    <i class="fa-solid fa-terminal text-cyan-400 text-sm"></i>
    <input id="cmd-input" type="text"
      class="flex-1 bg-transparent border-none outline-none text-white text-sm font-mono placeholder-gray-600"
      placeholder="Type a command... (e.g. 'run daily pipeline' or 'close loop abc-123') — Enter to execute"
      onkeydown="if(event.key==='Enter')parseAndSubmit()">
    <div id="cmd-status" class="text-xs text-gray-500 min-w-[100px] text-right"></div>
  </div>
  <!-- QUICK ACTIONS -->
  <div class="flex gap-2 mt-2 flex-wrap">
    <button onclick="quickFire('update_state','delta',{event:'ping',message:'manual ping'})" class="px-2.5 py-1 text-xs rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 transition">
      <i class="fa-solid fa-circle-dot text-green-400 mr-1"></i>Ping
    </button>
    <button onclick="quickFire('run_pipeline','mosaic',{pipeline:'daily'})" class="px-2.5 py-1 text-xs rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 transition">
      <i class="fa-solid fa-rotate text-cyan-400 mr-1"></i>Daily Pipeline
    </button>
    <button onclick="quickFire('compute_metric','mosaic',{metric:'compound_score'})" class="px-2.5 py-1 text-xs rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 transition">
      <i class="fa-solid fa-chart-line text-purple-400 mr-1"></i>Compound Score
    </button>
    <button onclick="quickFire('sync_service','cognitive',{target_service:'cognitive'})" class="px-2.5 py-1 text-xs rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 transition">
      <i class="fa-solid fa-arrows-rotate text-yellow-400 mr-1"></i>Sync Cognitive
    </button>
    <button onclick="quickFire('sync_service','delta',{target_service:'delta'})" class="px-2.5 py-1 text-xs rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 transition">
      <i class="fa-solid fa-arrows-rotate text-blue-400 mr-1"></i>Sync Delta
    </button>
    <button onclick="quickFire('archive_entity','cognitive',{entity_id:prompt('Entity ID to archive:')})" class="px-2.5 py-1 text-xs rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 transition">
      <i class="fa-solid fa-box-archive text-orange-400 mr-1"></i>Archive
    </button>
  </div>
</div>

<!-- MAIN CONTENT: TASKS + TIMELINE -->
<div class="grid grid-cols-3 gap-4">

  <!-- TASK FEED (2 cols) -->
  <div class="col-span-2 card">
    <div class="card-header px-4 py-3 flex items-center justify-between">
      <div class="text-sm font-semibold text-white">
        <i class="fa-solid fa-list-check text-cyan-400 mr-2"></i>Recent Tasks
      </div>
      <div class="text-xs text-gray-500" id="task-count">0 tasks</div>
    </div>
    <div id="task-feed" class="max-h-[600px] overflow-y-auto">
      <div class="p-8 text-center text-gray-600 text-sm">No tasks yet. Submit one to see it here.</div>
    </div>
  </div>

  <!-- TIMELINE (1 col) -->
  <div class="col-span-1 card">
    <div class="card-header px-4 py-3">
      <div class="text-sm font-semibold text-white">
        <i class="fa-solid fa-timeline text-green-400 mr-2"></i>Delta Timeline
      </div>
    </div>
    <div id="timeline-feed" class="max-h-[600px] overflow-y-auto p-4">
      <div class="text-center text-gray-600 text-sm">Loading...</div>
    </div>
  </div>

</div>

<script>
const CORTEX = 'http://localhost:3009';
const DELTA = 'http://localhost:3001';
const DELTA_KEY = 'b4aa24a027afc3ff3e07c670d89b129caab7ec933a6cbd95dbb49c281df1a7a7';
let startedAt = 0;
let expandedTask = null;

// --- Command Bar ---

const CMD_PATTERNS = [
  { re: /^ping$/i, intent: 'update_state', domain: 'delta', params: { event: 'ping', message: 'manual ping' } },
  { re: /^daily$/i, intent: 'run_pipeline', domain: 'mosaic', params: { pipeline: 'daily' } },
  { re: /^run\s+(.+)\s+pipeline$/i, intent: 'run_pipeline', domain: 'mosaic', fn: m => ({ pipeline: m[1] }) },
  { re: /^score$/i, intent: 'compute_metric', domain: 'mosaic', params: { metric: 'compound_score' } },
  { re: /^compute\s+(.+)$/i, intent: 'compute_metric', domain: 'mosaic', fn: m => ({ metric: m[1] }) },
  { re: /^sync\s+(\w+)$/i, intent: 'sync_service', domain: 'delta', fn: m => ({ target_service: m[1] }) },
  { re: /^close\s+(?:loop\s+)?(.+)$/i, intent: 'close_loop', domain: 'cognitive', fn: m => ({ loop_id: m[1].trim() }) },
  { re: /^archive\s+(.+)$/i, intent: 'archive_entity', domain: 'cognitive', fn: m => ({ entity_id: m[1].trim() }) },
  { re: /^state\s+(.+)$/i, intent: 'update_state', domain: 'delta', fn: m => ({ event: 'manual', message: m[1].trim() }) },
];

function parseAndSubmit() {
  const input = document.getElementById('cmd-input');
  const raw = input.value.trim();
  if (!raw) return;

  for (const pat of CMD_PATTERNS) {
    const m = raw.match(pat.re);
    if (m) {
      const params = pat.fn ? pat.fn(m) : pat.params;
      quickFire(pat.intent, pat.domain, params);
      input.value = '';
      return;
    }
  }

  // Fallback: treat as a directive for Claude to execute
  quickFire('execute_directive', 'cognitive', { instructions: raw, directive_type: 'EXECUTE', domain: 'manual' }, 2);
  input.value = '';
}

async function quickFire(intent, domain, params, priority = 1) {
  if (!params || (params.entity_id === null)) return; // cancelled prompt
  const statusEl = document.getElementById('cmd-status');
  statusEl.textContent = 'firing...';
  statusEl.className = 'text-xs text-cyan-400';

  try {
    const r = await fetch(`${CORTEX}/tasks/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tenant_id: 'atlas-primary', source: 'manual',
        intent, domain, priority, params,
        constraints: { timeout_seconds: 300, max_cost_usd: 0.50 }
      })
    });
    const d = await r.json();
    if (d.status === 'queued') {
      statusEl.textContent = `queued ${d.task_id.slice(0, 8)}`;
      statusEl.className = 'text-xs text-green-400';
      setTimeout(() => { fetchTasks(); fetchStatus(); }, 2000);
      setTimeout(() => { fetchTasks(); fetchTimeline(); }, 5000);
    } else {
      statusEl.textContent = 'error';
      statusEl.className = 'text-xs text-red-400';
    }
  } catch (e) {
    statusEl.textContent = e.message;
    statusEl.className = 'text-xs text-red-400';
  }
}

// --- Polling ---

async function fetchHealth() {
  try {
    const r = await fetch(`${CORTEX}/health`);
    const d = await r.json();
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    dot.className = 'status-dot ' + (d.status === 'ok' ? 'dot-ok' : 'dot-degraded');
    txt.textContent = d.status;
    startedAt = startedAt || d.timestamp;

    for (const [svc, state] of Object.entries(d.upstreams)) {
      const el = document.getElementById(`upstream-${svc}`);
      if (el) el.className = 'status-dot ' + (state === 'available' ? 'dot-ok' : 'dot-down');
    }
  } catch {
    document.getElementById('status-dot').className = 'status-dot dot-down';
    document.getElementById('status-text').textContent = 'offline';
  }
}

async function fetchStatus() {
  try {
    const r = await fetch(`${CORTEX}/status`);
    const d = await r.json();
    document.getElementById('m-processed').textContent = d.tasks_processed;
    document.getElementById('m-completed').textContent = d.tasks_completed;
    document.getElementById('m-failed').textContent = d.tasks_failed;
    document.getElementById('m-cost').textContent = `$${d.total_cost_usd.toFixed(4)}`;
    document.getElementById('m-queue').textContent = d.queue_size;
  } catch {}
}

async function fetchTasks() {
  try {
    const r = await fetch(`${CORTEX}/tasks/recent`);
    const tasks = await r.json();
    renderTasks(tasks);
  } catch {}
}

async function fetchTimeline() {
  try {
    const r = await fetch(`${DELTA}/api/timeline?source=cortex&limit=15`, {
      headers: { 'Authorization': `Bearer ${DELTA_KEY}` }
    });
    const d = await r.json();
    renderTimeline(d.events || []);
  } catch {
    document.getElementById('timeline-feed').innerHTML =
      '<div class="text-center text-gray-600 text-sm p-4">Delta unreachable</div>';
  }
}

// --- Rendering ---

function renderTasks(tasks) {
  const feed = document.getElementById('task-feed');
  document.getElementById('task-count').textContent = `${tasks.length} task${tasks.length !== 1 ? 's' : ''}`;

  if (!tasks.length) {
    feed.innerHTML = '<div class="p-8 text-center text-gray-600 text-sm">No tasks yet. Submit one to see it here.</div>';
    return;
  }

  feed.innerHTML = tasks.map(t => {
    const expanded = expandedTask === t.task_id;
    const ago = timeAgo(t.timestamp);
    return `
      <div class="task-row p-3 px-4" onclick="toggleTask('${t.task_id}')">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span class="badge badge-${t.status}">${t.status}</span>
            <span class="text-white text-sm font-medium">${t.intent}</span>
            <span class="text-gray-500 text-xs">${t.domain}</span>
          </div>
          <div class="flex items-center gap-3 text-xs text-gray-500">
            ${t.result ? `<span>$${t.result.total_cost_usd.toFixed(4)}</span>` : ''}
            ${t.result ? `<span>${t.result.duration_ms}ms</span>` : ''}
            <span>${ago}</span>
            <i class="fa-solid fa-chevron-${expanded ? 'up' : 'down'} text-gray-600"></i>
          </div>
        </div>
        ${expanded ? renderTaskDetail(t) : ''}
      </div>`;
  }).join('');
}

function renderTaskDetail(t) {
  let html = '<div class="mt-3 pt-3 border-t border-gray-800 text-xs">';

  // Task info
  html += `<div class="grid grid-cols-4 gap-2 mb-3 text-gray-400">
    <div><span class="text-gray-600">ID:</span> ${t.task_id.slice(0, 8)}...</div>
    <div><span class="text-gray-600">Source:</span> ${t.source}</div>
    <div><span class="text-gray-600">Priority:</span> ${t.priority}</div>
    <div><span class="text-gray-600">Plan:</span> ${t.spec ? t.spec.plan_method : 'none'}</div>
  </div>`;

  // Steps
  if (t.result && t.result.step_results.length) {
    html += '<div class="mb-2 text-gray-500 font-semibold">Steps</div>';
    t.result.step_results.forEach(sr => {
      const dotClass = sr.status === 'success' ? 'step-dot-success' : sr.status === 'failed' ? 'step-dot-failed' : 'step-dot-skipped';
      const color = sr.status === 'success' ? 'text-green-400' : sr.status === 'failed' ? 'text-red-400' : 'text-gray-500';
      html += `<div class="step-line mb-2">
        <div class="step-dot ${dotClass}"></div>
        <div class="flex items-center justify-between">
          <div>
            <span class="${color} font-medium">${sr.action_type}</span>
            ${sr.error ? `<span class="text-red-400 ml-2">${sr.error.code}: ${sr.error.message.slice(0, 60)}</span>` : ''}
          </div>
          <span class="text-gray-600">${sr.duration_ms}ms</span>
        </div>
      </div>`;
    });
  }

  // Verdict
  if (t.verdict) {
    const vColor = t.verdict.passed ? 'text-green-400' : 'text-red-400';
    html += `<div class="mt-2 pt-2 border-t border-gray-800">
      <span class="text-gray-500">Verdict:</span>
      <span class="${vColor} font-semibold ml-1">${t.verdict.recommendation}</span>
      <span class="text-gray-600 ml-2">confidence: ${(t.verdict.confidence * 100).toFixed(0)}%</span>
      ${t.verdict.failure_count ? `<span class="text-red-400 ml-2">${t.verdict.failure_count} failure(s)</span>` : ''}
    </div>`;
  }

  html += '</div>';
  return html;
}

function renderTimeline(events) {
  const feed = document.getElementById('timeline-feed');
  if (!events.length) {
    feed.innerHTML = '<div class="text-center text-gray-600 text-sm">No cortex events yet</div>';
    return;
  }

  feed.innerHTML = events.map(e => {
    const cls = e.type.includes('COMPLETED') || e.type.includes('completed') ? 'completed' :
                e.type.includes('FAILED') || e.type.includes('failed') ? 'failed' :
                e.type.includes('ESCALATED') ? 'escalated' : '';
    const ago = timeAgo(new Date(e.ts).getTime());
    const data = e.data || {};
    const detail = data.task_id ? `${data.task_id.slice(0, 8)}...` :
                   data.message ? data.message.slice(0, 50) :
                   JSON.stringify(data).slice(0, 50);
    return `<div class="timeline-event ${cls}">
      <div class="text-xs font-medium text-white">${e.type}</div>
      <div class="text-xs text-gray-500">${detail}</div>
      <div class="text-xs text-gray-600 mt-0.5">${ago}</div>
    </div>`;
  }).join('');
}

function toggleTask(id) {
  expandedTask = expandedTask === id ? null : id;
  fetchTasks();
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 5000) return 'just now';
  if (diff < 60000) return `${Math.floor(diff / 1000)}s ago`;
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  return `${Math.floor(diff / 3600000)}h ago`;
}

function updateUptime() {
  if (!startedAt) return;
  const diff = Date.now() - startedAt;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('uptime').textContent =
    `uptime ${h > 0 ? h + 'h ' : ''}${m}m ${s}s`;
}

// --- Init ---
fetchHealth(); fetchStatus(); fetchTasks(); fetchTimeline();
setInterval(fetchHealth, 5000);
setInterval(fetchStatus, 5000);
setInterval(fetchTasks, 5000);
setInterval(fetchTimeline, 15000);
setInterval(updateUptime, 1000);
</script>
</body>
</html>
