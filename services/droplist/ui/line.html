<script>
/* Engine client (KEYSTONE wire). Makes line.html a real client of the DropList engine instead
   of a localStorage-only twin. READS hydrate S.jobs from the DAG store; WRITES (drop/complete)
   go to the authenticated API and then re-hydrate from server truth. localStorage is demoted to
   an optimistic first-paint cache, never the source of truth. Graceful: if the engine is
   unreachable, wired stays false and the app behaves exactly as the offline demo (no regression).
   The old bridge fetched /api/now and handed it to tryWireLive() -- a function that was never
   defined -- so every server response was parsed and discarded.
   See ~/.claude/rules/common/code-as-furniture.md -- no broken code left in place. */
(function(){
  var TOKEN = (window.__DL_TOKEN__||'');
  function hdrs(write){ var h={'Accept':'application/json'}; if(write){ h['Content-Type']='application/json'; h['X-Atlas-Token']=TOKEN; } return h; }
  function mapStatus(s){ return s==='complete' ? 'done' : 'waiting'; }

  // Map one engine DAG (via its checklist, which carries node ids + per-node status) into a UI job.
  async function jobFromChecklist(dagId, fallbackGoal){
    var cl = await fetch('/api/dag/'+encodeURIComponent(dagId)+'/checklist', {headers:hdrs(false), cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('checklist '+r.status); return r.json(); });
    var tasks = cl.tasks || [];
    var steps = tasks.map(function(t){
      return { text:t.title||'', done:t.status==='done', ready:t.status==='ready', nodeId:t.id, doneCond:t.done_condition||'' };
    });
    var nextTask = tasks.find(function(t){ return t.status!=='done'; });
    return {
      id: cl.dag_id, dagId: cl.dag_id, serverBacked:true,
      title: cl.goal || fallbackGoal || '(untitled)',
      why:'', doneMeans: steps.map(function(s){return s.doneCond;}).filter(Boolean).join('; '),
      nextMove: nextTask ? nextTask.title : '',
      steps: steps, status: mapStatus(cl.status)
    };
  }

  var EngineClient = {
    wired:false,
    // READ: rebuild S.jobs from the engine and re-render -- the single source of truth.
    // The engine separates capture (a secured PACKET) from planning (a DAG). DAG-backed
    // jobs carry steps + node ids and are completable; a captured packet that has not yet
    // been planned into a DAG shows as a pending job so a drop is never lost. A packet that
    // already owns a DAG (matched by source_drop) is represented by that DAG, not duplicated.
    async hydrate(){
      try{
        var pair = await Promise.all([
          fetch('/api/dags', {headers:hdrs(false), cache:'no-store'}),
          fetch('/api/packets', {headers:hdrs(false), cache:'no-store'})
        ]);
        if(!pair[0].ok) throw new Error('dags '+pair[0].status);
        var dags = (await pair[0].json()).dags || [];
        var packets = pair[1].ok ? ((await pair[1].json()).packets || []) : [];
        var openDags = dags.filter(function(d){ return d.status!=='complete'; });
        var dagJobs = await Promise.all(openDags.map(function(d){ return jobFromChecklist(d.dag_id, d.goal); }));
        var planned = {};
        dags.forEach(function(d){ if(d.source_drop) planned[d.source_drop]=true; });
        var pktJobs = packets.filter(function(p){
          var id = p.drop_id || p.id;
          return id && !planned[id] && p.status!=='done' && p.status!=='dropped';
        }).map(function(p){
          return { id:'pkt:'+(p.drop_id||p.id), dropId:(p.drop_id||p.id), serverBacked:true, pending:true,
                   title: p.next_action || p.normalized_input || p.title || '(captured)',
                   why:'', doneMeans:'', nextMove:'', steps:[], status:'waiting' };
        });
        if(typeof S==='undefined' || !S) return false;
        var jobs = dagJobs.concat(pktJobs);   // DAG-backed jobs first -> they win the active slot
        // Merge-not-replace: keep local-only jobs the engine has never seen (captured while
        // offline / not yet synced) so a hydrate on reconnect can't destroy un-pushed work.
        // Engine jobs carry serverBacked; anything else is local user content. Dedupe by id so
        // a local job that has since become a DAG is not shown twice.
        // See ~/.claude/rules/common/code-as-furniture.md -- data-loss fix, not documented-and-left.
        var seen = {};
        jobs.forEach(function(j){ if(j && j.id) seen[j.id]=true; });
        var localOnly = (S.jobs||[]).filter(function(j){
          return j && !j.serverBacked && j.id && !seen[j.id] && j.status!=='done';
        });
        var prevActive = S.activeId;
        S.jobs = jobs.concat(localOnly);
        var keep = prevActive && S.jobs.filter(function(j){ return j.id===prevActive && j.status!=='done'; })[0];
        if(keep){ keep.status='active'; S.activeId=keep.id; }
        else if(typeof ensureActive==='function'){ ensureActive(); }
        this.wired = true;
        if(typeof save==='function') save();
        if(typeof render==='function') render();
        console.log('[droplist line] hydrated '+dagJobs.length+' job(s) + '+pktJobs.length+' pending capture(s) from engine');
        return true;
      }catch(err){
        console.log('[droplist line] engine unreachable, staying on local demo state:', err && err.message || err);
        return false;
      }
    },
    // WRITE: a captured thought goes through the intake valve (bouncer + chainer -> packet + DAG).
    async dropRaw(raw){
      var r = await fetch('/api/drop', {method:'POST', headers:hdrs(true), body:JSON.stringify({raw:raw})});
      if(!r.ok) throw new Error('drop '+r.status);
      return r.json();
    },
    async drop(raw){
      try{ await this.dropRaw(raw); await this.hydrate(); }
      catch(err){ console.log('[droplist line] drop failed, kept local optimistic copy:', err && err.message || err); }
    },
    async dropMany(list){
      try{ for(var i=0;i<list.length;i++){ await this.dropRaw(list[i]); } await this.hydrate(); }
      catch(err){ console.log('[droplist line] dropMany failed:', err && err.message || err); }
    },
    // WRITE: mark an engine node done (unblocks dependents, writes a dag_events row), then re-hydrate.
    async complete(dagId, nodeId){
      try{
        var r = await fetch('/api/dag/'+encodeURIComponent(dagId)+'/node/'+encodeURIComponent(nodeId)+'/complete',
          {method:'POST', headers:hdrs(true), body:'{}'});
        if(!r.ok && r.status!==409) throw new Error('complete '+r.status);
        await this.hydrate();
      }catch(err){ console.log('[droplist line] complete failed:', err && err.message || err); }
    }
  };
  window.EngineClient = EngineClient;
  // Back-compat with the old bridge contract: tryWireLive now triggers a real hydrate.
  window.tryWireLive = function(){ return EngineClient.hydrate(); };

  // ---- Swappable LLM picker (Task B, litellm). Populates from /api/ai/models
  // (only providers the server has keys for), persists choice, and sets the
  // window.DL_MODEL that the 5 AI call sites read. No model = AI buttons still
  // work as no-ops (they already try/catch to a manual fallback). ----
  var MODEL_KEY = 'droplist:model:v1';
  window.DL_MODEL = (function(){ try{ return localStorage.getItem(MODEL_KEY) || ''; }catch(e){ return ''; } })();
  var KEY_PROVIDERS = ['anthropic','openai','gemini','openrouter','ollama'];
  async function bootModelPicker(){
    var models = [], def = null, configured = {};
    try{
      var r = await fetch('/api/ai/models');
      if(r.ok){ var j = await r.json(); models = j.models||[]; def = j.default||null; }
    }catch(e){ /* offline / desktop pre-server — leave DL_MODEL as-is */ }
    try{
      var rk = await fetch('/api/ai/keys');
      if(rk.ok){ configured = (await rk.json()).configured || {}; }
    }catch(e){}
    if(!window.DL_MODEL && def) window.DL_MODEL = def;
    if(models.length && !models.some(function(m){return m.id===window.DL_MODEL;})) window.DL_MODEL = def || models[0].id;
    if(window.DL_MODEL){ try{ localStorage.setItem(MODEL_KEY, window.DL_MODEL); }catch(e){} }

    var old = document.getElementById('dl-ai-ctrl'); if(old) old.remove();   // idempotent re-render
    var wrap = document.createElement('div');
    wrap.id = 'dl-ai-ctrl';
    wrap.style.cssText = 'position:fixed;top:8px;right:10px;z-index:9999;font:12px/1.2 system-ui,sans-serif;display:flex;gap:6px;align-items:center;';

    if(models.length){
      var sel = document.createElement('select');
      sel.setAttribute('aria-label','AI model');
      sel.title = 'AI model — keys stay server-side';
      sel.style.cssText = 'background:#121614;color:#8b918c;border:1px solid #2a302c;border-radius:7px;padding:4px 8px;max-width:200px;';
      models.forEach(function(m){
        var o = document.createElement('option');
        o.value = m.id; o.textContent = m.provider + ' · ' + m.model;
        if(m.id===window.DL_MODEL) o.selected = true;
        o.style.color = '#0c0e0d';
        sel.appendChild(o);
      });
      sel.onchange = function(){ window.DL_MODEL = sel.value; try{ localStorage.setItem(MODEL_KEY, sel.value); }catch(e){} };
      wrap.appendChild(sel);
    }

    // 🔑 key affordance — ALWAYS shown (even with zero models) so you can add your
    // first key. Optional, like HYDRA's token field; key is stored server-side.
    var keyBtn = document.createElement('button');
    keyBtn.type = 'button';
    keyBtn.textContent = models.length ? '🔑' : '🔑 Add API key';
    keyBtn.setAttribute('aria-label','Set an AI provider API key');
    keyBtn.setAttribute('aria-expanded','false');
    keyBtn.style.cssText = 'background:#121614;color:#8b918c;border:1px solid #2a302c;border-radius:7px;padding:4px 9px;cursor:pointer;';
    wrap.appendChild(keyBtn);

    var panel = document.createElement('div');
    panel.style.cssText = 'display:none;position:absolute;top:34px;right:0;background:#101413;border:1px solid #2a302c;border-radius:9px;padding:10px;width:244px;box-shadow:0 6px 24px #0008;';
    var psel = document.createElement('select');
    psel.setAttribute('aria-label','Provider');
    psel.style.cssText = 'width:100%;box-sizing:border-box;background:#0c0e0d;color:#cdd3cf;border:1px solid #2a302c;border-radius:6px;padding:5px;margin-bottom:6px;';
    KEY_PROVIDERS.forEach(function(p){
      var o=document.createElement('option'); o.value=p; o.textContent = p + (configured[p] ? '  ✓ set' : '');
      psel.appendChild(o);
    });
    var inp = document.createElement('input');
    inp.type='password'; inp.placeholder='paste key (base URL for ollama)';
    inp.setAttribute('aria-label','API key');
    inp.style.cssText='width:100%;box-sizing:border-box;background:#0c0e0d;color:#cdd3cf;border:1px solid #2a302c;border-radius:6px;padding:6px;margin-bottom:6px;';
    var save = document.createElement('button');
    save.type='button'; save.textContent='Save key';
    save.style.cssText='width:100%;background:#1c2a24;color:#7fe3b3;border:1px solid #2f5a47;border-radius:6px;padding:6px;cursor:pointer;';
    var msg = document.createElement('div');
    msg.setAttribute('aria-live','polite');
    msg.style.cssText='color:#8b918c;margin-top:6px;min-height:14px;';
    msg.textContent = 'Stored on the server, never in the browser.';
    save.onclick = async function(){
      save.disabled=true; msg.textContent='Saving…';
      try{
        var rr = await fetch('/api/ai/keys', {method:'POST',
          headers:{'Content-Type':'application/json','X-Atlas-Token':(window.__DL_TOKEN__||'')},
          body: JSON.stringify({provider:psel.value, key:inp.value})});
        if(rr.ok){ inp.value=''; msg.textContent='Saved ✓'; bootModelPicker(); }
        else { msg.textContent='Failed ('+rr.status+') — check the write token'; }
      }catch(e){ msg.textContent='Error: '+(e&&e.message||e); }
      save.disabled=false;
    };
    panel.appendChild(psel); panel.appendChild(inp); panel.appendChild(save); panel.appendChild(msg);
    wrap.appendChild(panel);
    keyBtn.onclick = function(){
      var open = panel.style.display==='none';
      panel.style.display = open ? 'block' : 'none';
      keyBtn.setAttribute('aria-expanded', open ? 'true':'false');
      if(open) inp.focus();
    };

    document.body.appendChild(wrap);
  }
  bootModelPicker();

  // Boot: overlay engine truth on top of the instant localStorage first-paint.
  EngineClient.hydrate();
})();
</script>
</body>
</html>
