<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; padding: 12px 14px; width: 240px; background: #0a0a0a; color: #e0d0ff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
  h3 { margin: 0 0 8px 0; font-size: 11px; letter-spacing: 1.5px; color: #c084fc; text-transform: uppercase; }
  .scope { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #888;
    word-break: break-all; padding: 6px 8px; background: rgba(255,255,255,0.04); border-radius: 4px;
    margin-bottom: 8px; }
  .row { display: flex; gap: 4px; margin-top: 6px; }
  button { flex: 1; padding: 6px 8px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; color: #c8c8c8;
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
  button:hover { background: rgba(192,132,252,0.08); border-color: rgba(192,132,252,0.3); color: #e0d0ff; }
  button.primary { background: rgba(192,132,252,0.2); border-color: #c084fc; color: #fff; }
  .stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 11px; }
  .stat .v { color: #c084fc; font-weight: 700; }
  .hint { margin-top: 10px; font-size: 10px; color: #666; line-height: 1.4; }
  .hint b { color: #aaa; }
</style>
</head>
<body>
  <h3>Anatomy</h3>
  <div class="scope" id="scope">…</div>
  <div class="stat"><span>labels on this page</span><span class="v" id="count">—</span></div>
  <div class="row">
    <button class="primary" id="toggle">toggle</button>
  </div>
  <div class="row">
    <button id="export">export</button>
    <button id="clear">clear page</button>
  </div>
  <div class="hint">
    <b>Alt+click</b> any element to label it.<br/>
    <b>Hover a label</b> in the side panel to light up the region.
  </div>
  <script src="popup.js"></script>
</body>
</html>
